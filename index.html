  <script>
    // Register inline Service Worker for offline caching
    if('serviceWorker' in navigator){
      const swCode=`
        const CACHE='ppl-logger-v1';
        const URLS=[
          self.location.href.replace(/\\/sw\\.js.*/,''),
          'https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js',
          'https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js'
        ];
        self.addEventListener('install',e=>{e.waitUntil(caches.open(CACHE).then(c=>c.addAll(URLS).catch(()=>{})).then(()=>self.skipWaiting()));});
        self.addEventListener('activate',e=>{e.waitUntil(caches.keys().then(ks=>Promise.all(ks.filter(k=>k!==CACHE).map(k=>caches.delete(k)))).then(()=>self.clients.claim()));});
        self.addEventListener('fetch',e=>{e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).then(res=>{if(res.ok){const c=res.clone();caches.open(CACHE).then(ca=>ca.put(e.request,c));}return res;}).catch(()=>r)));});
      `;
      const blob=new Blob([swCode],{type:'application/javascript'});
      const url=URL.createObjectURL(blob);
      navigator.serviceWorker.register(url,{scope:'/'}).catch(()=>{});
    }
  </script>

function buildWeightsFromMaxes(maxes){
  const out={push:{},pull:{},legs:{}};
  Object.entries(maxes).forEach(([exName,{weight,reps,muscle}])=>{
    if(!weight||!reps||!muscle)return;
    const orm=epley(parseFloat(weight),parseFloat(reps));
    out[muscle][exName]=WEEK_PCTS.map(pct=>roundTo(orm*pct,INC[exName]||2.5));
  });
  return out;
}

function buildW2(w1Source){
  const out={push:{},pull:{},legs:{}};
  for(const [muscle,mappings] of Object.entries(S2_MAP)){
    for(const m of mappings){
      const src=w1Source[muscle]?.[m.src];
      out[muscle][m.s2]=src?src.map(w=>roundTo(w*m.factor,m.inc)):Array(20).fill(0);
    }
  }
  return out;
}

// Derive substitute weight array from the source exercise's programmed weights
function buildSubWeights(subDef,sourceWeights){
  if(!subDef||!sourceWeights)return Array(20).fill(0);
  return sourceWeights.map(w=>roundTo(w*subDef.factor,subDef.inc));
}

// ─── GAMIFICATION ─────────────────────────────────────────────────────────────
function calcStats(log,week,phases){
  let totalDone=0,allTimeDone=0,sessionsDone=0,prs=0,totalVolumeLoad=0;
  const phKey=getPhase(week,phases).phaseKey;

  // All-time sets and volume (for score)
  Object.values(log).forEach(v=>(v.sets||[]).forEach(s=>{
    if(!s?.done)return;
    allTimeDone++;
    totalVolumeLoad+=(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0);
  }));

  // Sets done THIS week only (for dashboard display)
  ["push","pull","legs"].forEach(m=>{
    ["1","2"].forEach(sl=>{
      const sid=`${m}-${sl}`;
      const exList=sl==="1"?BASE_EX[m]:S2_EX[m];
      const total=exList.reduce((s,ex)=>s+(ex.sets[phKey]||3),0);
      const done=exList.reduce((s,ex)=>{
        const e=log[`${sid}|w${week}|${ex.name}`]||{sets:[]};
        const d=(e.sets||[]).filter(x=>x?.done).length;
        totalDone+=d;
        return s+d;
      },0);
      if(total>0&&done>=total)sessionsDone++;
    });
  });

  // PRs: per-exercise per-sid — only compare same sid + same exercise across weeks
  ["push","pull","legs"].forEach(m=>{
    ["1","2"].forEach(sl=>{
      const sid=`${m}-${sl}`;
      const exList=sl==="1"?BASE_EX[m]:S2_EX[m];
      exList.forEach(ex=>{
        const thisEntry=log[`${sid}|w${week}|${ex.name}`];
        if(!thisEntry?.sets?.length)return;
        const thisMax=Math.max(0,...thisEntry.sets.filter(x=>x?.done&&x.weight).map(x=>parseFloat(x.weight)||0));
        if(!thisMax)return;
        let isPr=true;
        for(let pw=1;pw<week;pw++){
          const prev=log[`${sid}|w${pw}|${ex.name}`];
          if(!prev?.sets?.length)continue;
          const prevMax=Math.max(0,...prev.sets.filter(x=>x?.done&&x.weight).map(x=>parseFloat(x.weight)||0));
          if(thisMax<=prevMax){isPr=false;break;}
        }
        if(isPr&&week>1)prs++;
      });
    });
  });

  const score=Math.floor(totalVolumeLoad/500)+(sessionsDone*5)+(prs*3);
  const level=score<50?"Beginner":score<200?"Intermediate":score<500?"Advanced":"Elite";
  const bands={Beginner:[0,50],Intermediate:[50,200],Advanced:[200,500],Elite:[500,1000]};
  return{totalDone,allTimeDone,sessionsDone,prs,score,totalVolumeLoad,level,levelMin:bands[level][0],levelMax:bands[level][1]};
}

function weeklyVolume(log){
  const sets={},weight={};
  Object.entries(log).forEach(([key,val])=>{
    const m=key.match(/\|w(\d+)\|/);if(!m)return;
    const w=parseInt(m[1]);
    if(!sets[w])sets[w]=0;
    if(!weight[w])weight[w]=0;
    (val.sets||[]).forEach(s=>{
      if(!s?.done)return;
      sets[w]++;
      weight[w]+=(parseFloat(s.weight)||0)*(parseFloat(s.reps)||0);
    });
  });
  return{sets,weight};
}

// Build calendar map: {"2025-06-07": [{sid:"push-1",muscle:"push",label:"Push 1",color},...]}
function buildCalendarMap(sessionDates,accent){
  const map={};
  Object.entries(sessionDates).forEach(([key,date])=>{
    if(!date)return;
    const m=key.match(/^([a-z]+-[12])\|w\d+$/);
    if(!m)return;
    const sid=m[1];
    const muscle=sid.replace(/-[12]$/,"");
    const slot=sid.endsWith("-2")?"2":"1";
    const label=`${muscle.charAt(0).toUpperCase()+muscle.slice(1)} ${slot}`;
    const color=muscle==="push"?accent.push:muscle==="pull"?accent.pull:accent.legs;
    if(!map[date])map[date]=[];
    // Avoid duplicates (same session same day)
    if(!map[date].find(e=>e.sid===sid))map[date].push({sid,muscle,label,color});
  });
  return map;
}

// Export all data as a downloadable JSON file
function exportData(log,maxes,rpeAdj,settings,blocks,blockNum,week,sessionDates){
  const data={version:2,exportedAt:new Date().toISOString(),blockNum,week,log,maxes,rpeAdj,settings,blocks,sessionDates};
  const blob=new Blob([JSON.stringify(data,null,2)],{type:"application/json"});
  const url=URL.createObjectURL(blob);
  const a=document.createElement("a");
  a.href=url;a.download=`ppl-logger-backup-${new Date().toISOString().slice(0,10)}.json`;
  document.body.appendChild(a);a.click();
  setTimeout(()=>{document.body.removeChild(a);URL.revokeObjectURL(url);},100);
}

// Import data from a JSON backup file — returns parsed data or throws
function parseImport(jsonStr){
  const d=JSON.parse(jsonStr);
  if(!d.version||!d.log||!d.maxes)throw new Error("Invalid backup file");
  return d;
}

// Phase target RPE — the ideal average RPE for each phase
const PHASE_TARGET_RPE={accumulation:7.5,intensification:8.5,deload:6.0,peak:9.0};
// Display range shown as placeholder in RPE stepper (mirrors rep range style)
const PHASE_RPE_RANGE={accumulation:"7–8",intensification:"8–9",deload:"5–6",peak:"9–10"};

// Compute average RPE for a set of log entries
function avgRpe(sets){
  const rated=sets.filter(s=>s?.done&&s.rpe);
  if(rated.length<1)return null;
  return rated.reduce((s,x)=>s+parseInt(x.rpe),0)/rated.length;
}

// Compute per-exercise RPE adjustments from a completed week of log data.
// Returns {[sid|exName]: factor} where factor nudges next week's weight up/down.
function computeRpeAdj(log,week,phases,existingAdj){
  const phKey=getPhase(week,phases).phaseKey;
  const targetRpe=PHASE_TARGET_RPE[phKey]||8;
  const newAdj={...existingAdj};
  ["push","pull","legs"].forEach(m=>{
    ["1","2"].forEach(sl=>{
      const sid=`${m}-${sl}`;
      const exList=sl==="1"?BASE_EX[m]:S2_EX[m];
      exList.forEach(ex=>{
        const entry=log[mk(sid,week,ex.name)];
        if(!entry?.sets)return;
        const avg=avgRpe(entry.sets);
        if(avg===null)return; // not enough RPE data
        const diff=avg-targetRpe;
        // Each RPE point away from target = ±2.5% weight adjustment, capped at ±7.5%
        const nudge=Math.max(-0.075,Math.min(0.075,diff*0.025));
        const adjKey=`${sid}|${ex.name}`;
        const current=newAdj[adjKey]||1.0;
        // Blend: 70% existing, 30% new signal — avoids over-reacting to one session
        newAdj[adjKey]=Math.max(0.85,Math.min(1.15,current*0.7+(1+nudge)*0.3));
      });
    });
  });
  return newAdj;
}

// Weekly average RPE per muscle group, for the RPE trend chart
function weeklyRpeByMuscle(log){
  const out={}; // {week: {push,pull,legs,overall}}
  Object.entries(log).forEach(([key,val])=>{
    const m=key.match(/^(push|pull|legs)-[12]\|w(\d+)\|/);
    if(!m)return;
    const muscle=m[1],w=parseInt(m[2]);
    if(!out[w])out[w]={push:[],pull:[],legs:[]};
    (val.sets||[]).forEach(s=>{
      if(s?.done&&s.rpe)out[w][muscle].push(parseInt(s.rpe));
    });
  });
  // Average each
  const result={};
  Object.entries(out).forEach(([w,d])=>{
    const avg=arr=>arr.length?arr.reduce((a,b)=>a+b,0)/arr.length:null;
    const all=[...d.push,...d.pull,...d.legs];
    result[w]={push:avg(d.push),pull:avg(d.pull),legs:avg(d.legs),overall:avg(all)};
  });
  return result;
}

// ─── ROOT APP ─────────────────────────────────────────────────────────────────
function App(){
  const [settings,setSettingsState]=useState(()=>loadSettings());
  const [tab,setTab]=useState("dashboard");
  const [week,setWeekState]=useState(()=>loadWeek());
  const [log,setLog]=useState(()=>loadLog());
  const [maxes,setMaxes]=useState(()=>loadMaxes()||DEFAULT_MAXES);
  const [rpeAdj,setRpeAdj]=useState(()=>loadRpeAdj());
  const [blocks,setBlocks]=useState(()=>loadBlocks());
  const [blockNum,setBlockNum]=useState(()=>loadBlockNum());
  const [sessionDates,setSessionDates]=useState(()=>loadSessionDates());
  const [screen,setScreen]=useState("home");
  const [sid,setSid]=useState("push-1");
  const [saved,setSaved]=useState(false);
  const saveTimer=useRef(null);

  const theme=useMemo(()=>buildTheme(settings.mode,settings.accent),[settings]);
  const accent=theme.accent;
  const phases=useMemo(()=>buildPhases(accent),[accent]);
  const META=useMemo(()=>getMeta(accent),[accent]);

  const updSettings=useCallback(s=>{const ns={...settings,...s};setSettingsState(ns);saveSettings(ns);},[settings]);

  useEffect(()=>{
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>{saveLog(log);setSaved(true);setTimeout(()=>setSaved(false),1400);},600);
    return()=>clearTimeout(saveTimer.current);
  },[log]);

  const setWeek=useCallback(w=>{setWeekState(w);saveWeek(w);},[]);
  const phase=useMemo(()=>getPhase(week,phases),[week,phases]);
  const phaseKey=phase.phaseKey;

  const computedW1=useMemo(()=>buildWeightsFromMaxes(maxes),[maxes]);
  const mergedW1=useMemo(()=>({
    push:{...W1.push,...computedW1.push},
    pull:{...W1.pull,...computedW1.pull},
    legs:{...W1.legs,...computedW1.legs},
  }),[computedW1]);
  const mergedW2=useMemo(()=>buildW2(mergedW1),[mergedW1]);

  // Apply rpeAdj factors on top of base weights
  const applyRpeAdj=useCallback((muscle,slot,weightMap)=>{
    const out={};
    Object.entries(weightMap).forEach(([exName,arr])=>{
      const factor=rpeAdj[`${muscle}-${slot}|${exName}`]||1.0;
      const inc=INC[exName]||2.5;
      out[exName]=factor===1.0?arr:arr.map(w=>roundTo(w*factor,inc));
    });
    return out;
  },[rpeAdj]);

  const getW1=useCallback(muscle=>applyRpeAdj(muscle,"1",mergedW1[muscle]||{}),[mergedW1,applyRpeAdj]);
  const getW2=useCallback(muscle=>applyRpeAdj(muscle,"2",mergedW2[muscle]||{}),[mergedW2,applyRpeAdj]);

  // Called when leaving a session — recompute RPE adjustments for that week
  const finaliseRpeAdj=useCallback((forWeek)=>{
    const newAdj=computeRpeAdj(log,forWeek,phases,rpeAdj);
    setRpeAdj(newAdj);
    saveRpeAdj(newAdj);
  },[log,phases,rpeAdj]);

  const updSet=useCallback((s,wk,ex,i,f,v,fallbackW,fallbackR,fallbackRpe)=>{
    if(f==="weight")v=String(v).replace(",",".");
    const key=mk(s,wk,ex);
    setLog(p=>{
      const e=p[key]||{sets:[],note:""};
      const sets=[...(e.sets||[])];
      const cur=sets[i]||{};
      const updated={...cur,[f]:v};
      if(f!=="done"&&f!=="rpe"){
        const w=f==="weight"?v:cur.weight,r=f==="reps"?v:cur.reps;
        updated.done=!!(w&&String(w).trim()&&r&&String(r).trim());
      } else if(f==="done"&&v===true){
        if(!updated.weight||!String(updated.weight).trim())updated.weight=String(fallbackW||"");
        if(!updated.reps||!String(updated.reps).trim())updated.reps=String(fallbackR||"");
        if(!updated.rpe&&fallbackRpe)updated.rpe=fallbackRpe;
      } else if(f==="done"&&v===false){
        // Clear auto-filled RPE when unticking — only clear if it matches the fallback
        // (i.e. it was auto-filled, not manually set to something different)
        if(updated.rpe&&fallbackRpe&&String(updated.rpe)===String(fallbackRpe))delete updated.rpe;
      }
      sets[i]=updated;
      return{...p,[key]:{...e,sets}};
    });
  },[]);

  const updNote=useCallback((s,wk,ex,note)=>{
    const key=mk(s,wk,ex);
    setLog(p=>{const e=p[key]||{sets:[],note:""};return{...p,[key]:{...e,note}};});
  },[]);

  const getEntry=useCallback((s,wk,ex)=>log[mk(s,wk,ex)]||{sets:[],note:""},[log]);

  const getStats=useCallback(sid=>{
    const m=META[sid];
    const total=m.exercises.reduce((s,ex)=>s+(ex.sets[phaseKey]||3),0);
    const done=m.exercises.reduce((s,ex)=>s+(getEntry(sid,week,ex.name).sets||[]).filter(x=>x?.done).length,0);
    return{total,done,pct:total>0?done/total:0};
  },[META,phaseKey,getEntry,week]);

  const handleSaveMaxes=useCallback(nm=>{setMaxes(nm);saveMaxes(nm);},[]);

  const handleReset=useCallback(()=>{
    setLog({});setRpeAdj({});setWeekState(1);setSessionDates({});
    saveLog({});saveRpeAdj({});saveWeek(1);saveSessionDates({});
  },[]);

  // Archive current block and start a fresh one
  const handleStartNewBlock=useCallback(()=>{
    const archived={blockNum,startedAt:new Date().toISOString(),log,maxes,rpeAdj,sessionDates};
    const newBlocks=[...blocks,archived];
    const newBlockNum=blockNum+1;
    setBlocks(newBlocks);saveBlocks(newBlocks);
    setBlockNum(newBlockNum);saveBlockNum(newBlockNum);
    setLog({});saveLog({});
    setRpeAdj({});saveRpeAdj({});
    setSessionDates({});saveSessionDates({});
    setWeekState(1);saveWeek(1);
  },[blockNum,log,maxes,rpeAdj,blocks,sessionDates]);

  const handleExport=useCallback(()=>{
    exportData(log,maxes,rpeAdj,settings,blocks,blockNum,week,sessionDates);
  },[log,maxes,rpeAdj,settings,blocks,blockNum,week,sessionDates]);

  const handleImport=useCallback(jsonStr=>{
    try{
      const d=parseImport(jsonStr);
      setLog(d.log);saveLog(d.log);
      setMaxes(d.maxes);saveMaxes(d.maxes);
      if(d.rpeAdj){setRpeAdj(d.rpeAdj);saveRpeAdj(d.rpeAdj);}
      if(d.blocks){setBlocks(d.blocks);saveBlocks(d.blocks);}
      if(d.blockNum){setBlockNum(d.blockNum);saveBlockNum(d.blockNum);}
      if(d.settings){setSettingsState(d.settings);saveSettings(d.settings);}
      if(d.sessionDates){setSessionDates(d.sessionDates);saveSessionDates(d.sessionDates);}
      // Restore week from backup, default to 1
      const restoredWeek=d.week&&d.week>=1&&d.week<=20?d.week:1;
      setWeekState(restoredWeek);saveWeek(restoredWeek);
      return true;
    }catch(e){return false;}
  },[]);

  const handleSessionBack=useCallback(()=>{
    finaliseRpeAdj(week);
    // Stamp today's date only if not already stamped (prevents overwriting on re-entry)
    const dateKey=`${sid}|w${week}`;
    setSessionDates(prev=>{
      if(prev[dateKey])return prev; // already stamped — don't overwrite
      // Check log directly via setLog to avoid stale closure
      let hasDone=false;
      setLog(l=>{
        hasDone=META[sid].exercises.some(ex=>(l[mk(sid,week,ex.name)]?.sets||[]).some(s=>s?.done));
        return l; // no change
      });
      if(!hasDone)return prev;
      const newDates={...prev,[dateKey]:todayStr()};
      saveSessionDates(newDates);
      return newDates;
    });
    setScreen("home");
  },[week,sid,META,sessionDates,finaliseRpeAdj]);

  // Persist swaps across Back/Forward within the same day — keyed by sid|week
  const sessionSwapsRef=useRef({});

  const showSession=screen==="session";
  const showHistory=screen==="history";
  const showTab=!showSession&&!showHistory;
  const T=theme;

  return(
    <ThemeCtx.Provider value={T}>
    <div style={{display:"flex",flexDirection:"column",height:"100vh",background:T.bg,maxWidth:480,margin:"0 auto",fontFamily:"-apple-system,'Helvetica Neue',sans-serif",color:T.text}}>
      <div style={{flex:1,overflow:"hidden",display:"flex",flexDirection:"column",minHeight:0}}>
        {showTab&&tab==="dashboard"&&<DashboardTab log={log} week={week} setWeek={setWeek} phase={phase} phases={phases} accent={accent} rpeAdj={rpeAdj} blockNum={blockNum} sessionDates={sessionDates} onGoProgram={()=>setTab("program")} onGoSession={(s)=>{setSid(s);setScreen("session");}} onNewBlock={handleStartNewBlock}/>}
        {showTab&&tab==="program"&&<ProgramTab week={week} setWeek={setWeek} phase={phase} phases={phases} phaseKey={phaseKey} accent={accent} getStats={getStats} META={META} setSid={s=>{setSid(s);setScreen("session");}} onHistory={()=>setScreen("history")}/>}
        {showTab&&tab==="maxes"&&<MaxesTab maxes={maxes} onSave={handleSaveMaxes}/>}
        {showTab&&tab==="settings"&&<SettingsTab settings={settings} onUpdate={updSettings} onReset={handleReset} onExport={handleExport} onImport={handleImport}/>}
        {showSession&&<SessionScreen sid={sid} week={week} phase={phase} phaseKey={phaseKey} META={META} getEntry={getEntry} updSet={updSet} updNote={updNote} saved={saved} getW1={getW1} getW2={getW2} rpeAdj={rpeAdj} phases={phases} sessionSwapsRef={sessionSwapsRef} onBack={handleSessionBack}/>}
        {showHistory&&<HistoryScreen log={log} phases={phases} META={META} blocks={blocks} accent={accent} onBack={()=>setScreen("home")}/>}
      </div>
      <div className="safe-bottom" style={{background:T.bgHeader,borderTop:`1px solid ${T.border}`,display:"flex",paddingTop:8,flexShrink:0}}>
        {[
          {id:"dashboard",label:"Dashboard",color:"#f97316",svg:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>},
          {id:"program", label:"Program", color:"#3b82f6",svg:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 4v16M18 4v16M6 12h12M3 4h4M17 4h4M3 20h4M17 20h4"/></svg>},
          {id:"maxes",   label:"Maxes",   color:"#22c55e",svg:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"/></svg>},
          {id:"settings",label:"Settings",color:"#a855f7",svg:<svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>},
        ].map((t,idx)=>{
          const active=tab===t.id&&showTab;
          return <React.Fragment key={t.id}>
            {idx>0&&<div style={{width:1,height:32,background:T.border,alignSelf:"center",flexShrink:0}}/>}
            <button onClick={()=>{setTab(t.id);setScreen("home");}} style={{flex:1,background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:3,paddingBottom:4,color:t.color,opacity:active?1:0.4,transition:"opacity 0.15s"}}>
              {t.svg}
              <span style={{fontSize:10,fontWeight:active?700:500,color:t.color}}>{t.label}</span>
              {active&&<div style={{width:20,height:2,borderRadius:1,background:t.color,marginTop:0}}/>}
            </button>
          </React.Fragment>;
        })}
      </div>
    </div>
    </ThemeCtx.Provider>
  );
}

// ─── CALENDAR CARD ────────────────────────────────────────────────────────────
const MONTH_NAMES=["January","February","March","April","May","June","July","August","September","October","November","December"];
const DAY_LABELS=["M","T","W","T","F","S","S"];

// Today at midnight — stable reference used by CalendarCard
const CAL_TODAY=(()=>{const d=new Date();d.setHours(0,0,0,0);return d;})();

function CalendarCard({calendarMap,accent}){
  const T=useTheme();
  const now=CAL_TODAY;
  const [viewYear,setViewYear]=useState(now.getFullYear());
  const [viewMonth,setViewMonth]=useState(now.getMonth());
  const [tipDate,setTipDate]=useState(null);

  const todayIso=toDateStr(now);

  // Build grid of days for the viewed month
  // Always start from Monday, pad with nulls for days before the 1st and after the last
  const calDays=useMemo(()=>{
    const firstDay=new Date(viewYear,viewMonth,1);
    const lastDay=new Date(viewYear,viewMonth+1,0);
    // getDay(): 0=Sun,1=Mon...6=Sat → convert to Mon-based: Mon=0...Sun=6
    const startPad=(firstDay.getDay()+6)%7; // how many empty cells before 1st
    const totalDays=lastDay.getDate();
    const cells=[];
    for(let i=0;i<startPad;i++)cells.push(null);
    for(let d=1;d<=totalDays;d++){
      cells.push(new Date(viewYear,viewMonth,d));
    }
    // Pad end to complete last row
    while(cells.length%7!==0)cells.push(null);
    // Split into weeks
    const weeks=[];
    for(let i=0;i<cells.length;i+=7)weeks.push(cells.slice(i,i+7));
    return weeks;
  },[viewYear,viewMonth]);

  // Check if there are any sessions in a given month (for nav disabling)
  const hasSessions=useMemo(()=>{
    return Object.keys(calendarMap).some(iso=>{
      const d=new Date(iso+"T12:00:00");
      return d.getFullYear()===viewYear&&d.getMonth()===viewMonth;
    });
  },[calendarMap,viewYear,viewMonth]);

  const canGoBack=useMemo(()=>{
    // Can go back if there are any sessions in any prior month
    return Object.keys(calendarMap).some(iso=>{
      const d=new Date(iso+"T12:00:00");
      return d.getFullYear()<viewYear||(d.getFullYear()===viewYear&&d.getMonth()<viewMonth);
    });
  },[calendarMap,viewYear,viewMonth]);

  const isCurrentMonth=viewYear===now.getFullYear()&&viewMonth===now.getMonth();

  const prevMonth=()=>{
    if(viewMonth===0){setViewMonth(11);setViewYear(y=>y-1);}
    else setViewMonth(m=>m-1);
    setTipDate(null);
  };
  const nextMonth=()=>{
    if(!isCurrentMonth){
      if(viewMonth===11){setViewMonth(0);setViewYear(y=>y+1);}
      else setViewMonth(m=>m+1);
      setTipDate(null);
    }
  };

  return(
    <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",boxShadow:T.shadow}}>
      {/* Header with month nav */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <div style={{fontSize:13,fontWeight:700,color:T.text}}>
          {MONTH_NAMES[viewMonth]} {viewYear}
        </div>
        <div style={{display:"flex",gap:4}}>
          <button onClick={prevMonth} disabled={!canGoBack}
            style={{background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:T.r10,width:32,height:32,cursor:canGoBack?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",opacity:canGoBack?1:0.3}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
          </button>
          <button onClick={nextMonth} disabled={isCurrentMonth}
            style={{background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:T.r10,width:32,height:32,cursor:isCurrentMonth?"default":"pointer",display:"flex",alignItems:"center",justifyContent:"center",opacity:isCurrentMonth?0.3:1}}>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke={T.text} strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
          </button>
        </div>
      </div>

      {/* Day headers */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
        {DAY_LABELS.map((d,i)=>(
          <div key={i} style={{textAlign:"center",fontSize:10,fontWeight:700,color:T.textMuted,letterSpacing:0.5,paddingBottom:4}}>{d}</div>
        ))}
      </div>

      {/* Calendar grid */}
      {calDays.map((week,wi)=>(
        <div key={wi} style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:4}}>
          {week.map((calDate,di)=>{
            if(!calDate) return <div key={di}/>;
            const iso=toDateStr(calDate);
            const sessions=calendarMap[iso]||[];
            const isToday=iso===todayIso;
            const isFuture=calDate>now;
            const isSelected=tipDate===iso;
            const hasSess=sessions.length>0;
            return(
              <div key={di} onClick={()=>hasSess&&setTipDate(isSelected?null:iso)}
                style={{display:"flex",flexDirection:"column",alignItems:"center",gap:2,cursor:hasSess?"pointer":"default",padding:"2px 0",minHeight:44,justifyContent:"center"}}>
                <div style={{
                  width:30,height:30,borderRadius:"50%",
                  display:"flex",alignItems:"center",justifyContent:"center",
                  background:isToday?accent.acc:isSelected?accent.acc+"22":"transparent",
                  border:isSelected&&!isToday?`2px solid ${accent.acc}`:`2px solid transparent`,
                  transition:"background 0.15s",
                }}>
                  <span style={{
                    fontSize:13,fontWeight:isToday?800:hasSess?600:400,
                    color:isToday?"#fff":isFuture?T.textMuted:hasSess?T.text:T.textSub,
                  }}>{calDate.getDate()}</span>
                </div>
                {/* Session dots */}
                <div style={{display:"flex",gap:2,height:5,alignItems:"center"}}>
                  {sessions.slice(0,3).map((s,si)=>(
                    <div key={si} style={{width:4,height:4,borderRadius:"50%",background:s.color}}/>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      ))}

      {/* Tapped day detail */}
      {tipDate&&calendarMap[tipDate]&&(
        <div style={{marginTop:10,padding:"10px 12px",background:T.bgInset,borderRadius:T.r10,border:`1px solid ${T.border}`}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
            <div style={{fontSize:10,color:T.textSub,fontWeight:600}}>
              {new Date(tipDate+"T12:00:00").toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long"})}
            </div>
            <button onClick={()=>setTipDate(null)}
              style={{background:"none",border:"none",cursor:"pointer",color:T.textMuted,fontSize:16,lineHeight:1,padding:"0 0 0 8px",fontFamily:"inherit"}}>✕</button>
          </div>
          <div style={{display:"flex",flexDirection:"column",gap:6}}>
            {calendarMap[tipDate].map((s,i)=>(
              <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                <div style={{width:8,height:8,borderRadius:"50%",background:s.color,flexShrink:0}}/>
                <span style={{fontSize:13,fontWeight:600,color:T.text}}>{s.label}</span>
                <span style={{fontSize:10,color:T.textSub,marginLeft:"auto",textTransform:"capitalize"}}>{s.muscle}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {/* Empty state for current month with no sessions */}
      {!hasSessions&&isCurrentMonth&&(
        <div style={{textAlign:"center",padding:"8px 0 4px",fontSize:11,color:T.textMuted}}>
          Sessions will appear here as you train
        </div>
      )}

      {/* Legend */}
      <div style={{display:"flex",gap:12,marginTop:12,paddingTop:10,borderTop:`1px solid ${T.borderMid}`}}>
        {[{c:accent.push,l:"Push"},{c:accent.pull,l:"Pull"},{c:accent.legs,l:"Legs"}].map(x=>(
          <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}>
            <div style={{width:6,height:6,borderRadius:"50%",background:x.c}}/>
            <span style={{fontSize:10,color:T.textSub}}>{x.l}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function DashboardTab({log,week,setWeek,phase,phases,accent,rpeAdj,blockNum,sessionDates,onGoProgram,onGoSession,onNewBlock}){
  const T=useTheme();
  const [showAchievements,setShowAchievements]=useState(false);
  const [showAdjPanel,setShowAdjPanel]=useState(false);
  const [showNewBlock,setShowNewBlock]=useState(false);
  const calendarMap=useMemo(()=>buildCalendarMap(sessionDates,accent),[sessionDates,accent]);
  const stats=useMemo(()=>calcStats(log,week,phases),[log,week,phases]);
  const volData=useMemo(()=>weeklyVolume(log),[log]);
  const [chartMetric,setChartMetric]=useState("sets");

  const pct=Math.min(1,(stats.score-stats.levelMin)/Math.max(1,stats.levelMax-stats.levelMin));
  const lvlColor={Beginner:accent.dld,Intermediate:accent.pull,Advanced:accent.push,Elite:accent.peak}[stats.level];

  // Session completion dots for this week
  const sessionDots=useMemo(()=>["push","pull","legs"].flatMap(m=>["1","2"].map(sl=>{
    const sid=`${m}-${sl}`;
    const exList=sl==="1"?BASE_EX[m]:S2_EX[m];
    const phKey=phase.phaseKey;
    const total=exList.reduce((s,ex)=>s+(ex.sets[phKey]||3),0);
    const done=exList.reduce((s,ex)=>{const e=log[`${sid}|w${week}|${ex.name}`]||{sets:[]};return s+(e.sets||[]).filter(x=>x?.done).length;},0);
    const color=m==="push"?accent.push:m==="pull"?accent.pull:accent.legs;
    const label=`${m.charAt(0).toUpperCase()+m.slice(1)} ${sl}`;
    return{sid,label,color,done,total,pct:total>0?done/total:0};
  })),[log,week,phase,accent]);

  // Weeks where all 3 primary sessions are complete
  const weeksDone=useMemo(()=>Array.from({length:20},(_,i)=>i+1).filter(w=>{
    return["push","pull","legs"].every(m=>{
      const exList=BASE_EX[m];
      const phKey=getPhase(w,phases).phaseKey;
      const total=exList.reduce((s,ex)=>s+(ex.sets[phKey]||3),0);
      const done=exList.reduce((s,ex)=>{const e=log[`${m}-1|w${w}|${ex.name}`]||{sets:[]};return s+(e.sets||[]).filter(x=>x?.done).length;},0);
      return total>0&&done>=total;
    });
  }),[log,phases]);

  const chartWeeks=useMemo(()=>Array.from({length:Math.min(8,week)},(_,i)=>Math.max(1,week-Math.min(7,week-1)+i)),[week]);
  const vol=chartMetric==="sets"?volData.sets:volData.weight;
  const maxVol=useMemo(()=>Math.max(1,...chartWeeks.map(w=>vol[w]||0)),[chartWeeks,vol]);

  const fmtVol=v=>v>=1000?`${(v/1000).toFixed(1)}t`:`${Math.round(v)}kg`;

  const CYCLE_ORDER=["push-1","pull-1","legs-1","push-2","pull-2","legs-2"];
  const todaySid=useMemo(()=>{
    const inc=CYCLE_ORDER.find(sid=>{
      const exList=sid.endsWith("-1")?BASE_EX[sid.replace("-1","")]:S2_EX[sid.replace("-2","")];
      const phKey=phase.phaseKey;
      const total=exList.reduce((s,ex)=>s+(ex.sets[phKey]||3),0);
      const done=exList.reduce((s,ex)=>{const e=log[`${sid}|w${week}|${ex.name}`]||{sets:[]};return s+(e.sets||[]).filter(x=>x?.done).length;},0);
      return done<total;
    });
    return inc||CYCLE_ORDER[0];
  },[log,week,phase]);

  const rpeByWeek=useMemo(()=>weeklyRpeByMuscle(log),[log]);
  const activeAdjs=useMemo(()=>{
    const adjs=[];
    ["push","pull","legs"].forEach(m=>{["1","2"].forEach(sl=>{
      const sid=`${m}-${sl}`;
      const exList=sl==="1"?BASE_EX[m]:S2_EX[m];
      exList.forEach(ex=>{
        const factor=rpeAdj[`${sid}|${ex.name}`];
        if(factor&&Math.abs(factor-1)>0.01)adjs.push({name:ex.name,factor,pct:Math.round((factor-1)*100)});
      });
    });});
    return adjs.sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct)).slice(0,4);
  },[rpeAdj]);

  return(
    <div className="scroll tab-enter" style={{flex:1,background:T.bg}}>
      <div className="safe-top" style={{background:T.bgHeader,padding:"0 20px 16px",borderBottom:`1px solid ${T.border}`}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingTop:14}}>
          <div style={{fontSize:22,fontWeight:800,color:T.text}}>Dashboard</div>
          <div style={{fontSize:12,color:T.textSub,paddingBottom:2}}>Week {week} · {phase.name}</div>
        </div>
      </div>
      <div style={{padding:"16px 14px 32px",display:"flex",flexDirection:"column",gap:14}}>

        {/* Today's session shortcut — taps DIRECTLY into session screen */}
        {(()=>{
          const muscle=todaySid.replace(/-[12]$/,"");
          const slot=todaySid.endsWith("-2")?"2":"1";
          const color=muscle==="push"?accent.push:muscle==="pull"?accent.pull:accent.legs;
          const label=`${muscle.charAt(0).toUpperCase()+muscle.slice(1)} ${slot}`;
          const isVar=slot==="2";
          const exList=isVar?S2_EX[muscle]:BASE_EX[muscle];
          const total=exList.reduce((s,ex)=>s+(ex.sets[phase.phaseKey]||3),0);
          const done=exList.reduce((s,ex)=>{const e=log[`${todaySid}|w${week}|${ex.name}`]||{sets:[]};return s+(e.sets||[]).filter(x=>x?.done).length;},0);
          const pct=total>0?done/total:0;
          const allDone=pct>=1;
          return(
            <button onClick={()=>allDone?onGoProgram():onGoSession(todaySid)} style={{background:allDone?T.bgCard:`${color}18`,borderRadius:T.r16,padding:"14px 16px",boxShadow:T.shadow,border:`2px solid ${allDone?T.border:color}`,cursor:"pointer",textAlign:"left",width:"100%",fontFamily:"inherit",display:"flex",alignItems:"center",gap:14}}>
              <div style={{width:48,height:48,borderRadius:T.r16,background:allDone?T.bgInput:color,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke={allDone?"#8e8e93":"#fff"} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                  {allDone
                    ?<polyline points="20 6 9 17 4 12"/>
                    :<><path d="M6 4v16M18 4v16M6 12h12M3 4h4M17 4h4M3 20h4M17 20h4"/></>}
                </svg>
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:10,fontWeight:700,color:allDone?T.textSub:color,letterSpacing:1,textTransform:"uppercase",marginBottom:3}}>{allDone?"All done today":"Start next session"}</div>
                <div style={{fontSize:17,fontWeight:800,color:allDone?T.textSub:T.text,marginBottom:6}}>{label}{isVar&&<span style={{fontSize:11,fontWeight:500,color:color,marginLeft:6}}>Variations</span>}</div>
                <div style={{height:4,background:T.bgInput,borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",width:`${pct*100}%`,background:color,borderRadius:2,transition:"width 0.4s"}}/>
                </div>
                <div style={{fontSize:10,color:allDone?T.textSub:color,marginTop:4,fontWeight:600}}>{done}/{total} sets · Week {week}</div>
              </div>
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke={allDone?T.textMuted:color} strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
            </button>
          );
        })()}

        {/* Week 20 completion banner */}
        {week===20&&weeksDone.length>=3&&(
          <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",border:`1.5px solid #a855f755`,boxShadow:T.shadow}}>
            <div style={{fontSize:18,marginBottom:6}}>🏆</div>
            <div style={{fontSize:15,fontWeight:800,color:T.text,marginBottom:4}}>Block {blockNum} Complete!</div>
            <div style={{fontSize:12,color:T.textSub,lineHeight:1.5,marginBottom:14}}>You've finished all 20 weeks. Re-test your maxes, then start a new block — your history is preserved.</div>
            {!showNewBlock?(
              <button onClick={()=>setShowNewBlock(true)}
                style={{background:"#a855f7",border:"none",borderRadius:T.r10,padding:"11px 20px",color:"#fff",fontSize:13,fontWeight:700,cursor:"pointer",fontFamily:"inherit"}}>
                Start Block {blockNum+1} →
              </button>
            ):(
              <div style={{background:T.bgInset,borderRadius:T.r10,padding:"14px",border:`1px solid ${T.border}`}}>
                <div style={{fontSize:13,fontWeight:700,color:T.text,marginBottom:4}}>Archive Block {blockNum} and reset to Week 1?</div>
                <div style={{fontSize:11,color:T.textSub,marginBottom:12,lineHeight:1.5}}>Your log, RPE data and history are saved. Update your maxes first if you haven't already.</div>
                <div style={{display:"flex",gap:8}}>
                  <button onClick={()=>setShowNewBlock(false)}
                    style={{flex:1,background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:8,padding:"10px",fontSize:13,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:T.text}}>Cancel</button>
                  <button onClick={()=>{onNewBlock();setShowNewBlock(false);}}
                    style={{flex:2,background:"#a855f7",border:"none",borderRadius:8,padding:"10px",fontSize:13,fontWeight:700,cursor:"pointer",color:"#fff",fontFamily:"inherit"}}>Yes, Start Block {blockNum+1}</button>
                </div>
              </div>
            )}
          </div>
        )}

        {/* Training overview — sessions hero + supporting stats */}
        <div style={{background:T.bgCard,borderRadius:T.r16,padding:"18px",boxShadow:T.shadow}}>
          {/* Sessions this week — hero number */}
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:16}}>
            <div>
              <div style={{fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:1,textTransform:"uppercase",marginBottom:6}}>This Week</div>
              <div style={{display:"flex",alignItems:"baseline",gap:6}}>
                <span style={{fontSize:42,fontWeight:900,color:T.text,lineHeight:1}}>{stats.sessionsDone}</span>
                <span style={{fontSize:16,color:T.textSub,fontWeight:500}}>/ 6 sessions</span>
              </div>
              <div style={{fontSize:12,color:T.textSub,marginTop:4}}>
                {stats.sessionsDone===0?"No sessions logged yet"
                  :stats.sessionsDone===6?"Full week complete 🎉"
                  :`${6-stats.sessionsDone} session${6-stats.sessionsDone!==1?"s":""} remaining`}
              </div>
            </div>
            <div style={{display:"flex",gap:6}}>
              <button onClick={()=>setWeek(Math.max(1,week-1))} style={{background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:T.r10,width:38,height:38,cursor:"pointer",color:T.text,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <button onClick={()=>setWeek(Math.min(20,week+1))} style={{background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:T.r10,width:38,height:38,cursor:"pointer",color:T.text,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
          </div>
          {/* Session progress bar */}
          <div style={{height:6,background:T.bgInput,borderRadius:3,overflow:"hidden",marginBottom:16}}>
            <div style={{height:"100%",width:`${(stats.sessionsDone/6)*100}%`,background:phase.color,borderRadius:3,transition:"width 0.6s ease"}}/>
          </div>
          {/* Session dots — tappable, go directly into session */}
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:6,marginBottom:16}}>
            {sessionDots.map(s=>(
              <button key={s.sid} onClick={()=>s.pct>=1?null:onGoSession(s.sid)}
                style={{cursor:s.pct>=1?"default":"pointer",textAlign:"center",padding:"8px 4px",background:s.pct>=1?s.color+"20":T.bgInset,borderRadius:T.r10,border:`1.5px solid ${s.pct>=1?s.color+"60":T.border}`,fontFamily:"inherit",display:"flex",flexDirection:"column",alignItems:"center",gap:3}}>
                <div style={{width:20,height:20,borderRadius:"50%",background:s.pct>=1?s.color:T.border,display:"flex",alignItems:"center",justifyContent:"center"}}>
                  {s.pct>=1
                    ?<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" strokeWidth="3" strokeLinecap="round"><polyline points="20 6 9 17 4 12"/></svg>
                    :<div style={{width:6,height:6,borderRadius:"50%",background:T.bgInput}}/>}
                </div>
                <div style={{fontSize:9,fontWeight:700,color:s.pct>=1?s.color:T.textSub}}>{s.label}</div>
                {s.done>0&&s.pct<1&&<div style={{fontSize:8,color:T.textMuted}}>{s.done}/{s.total}</div>}
              </button>
            ))}
          </div>
          {/* Supporting stats */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:0,paddingTop:14,borderTop:`1px solid ${T.borderMid}`}}>
            {[
              {val:stats.totalDone,label:"Sets This Week",color:accent.pull},
              {val:stats.prs,label:"PRs Set",color:accent.peak},
              {val:weeksDone.length,label:"Weeks Done",color:accent.push},
            ].map((s,i)=>(
              <div key={s.label} style={{textAlign:"center",borderRight:i<2?`1px solid ${T.borderMid}`:"none",padding:"0 4px"}}>
                <div style={{fontSize:20,fontWeight:900,color:s.color}}>{s.val}</div>
                <div style={{fontSize:9,color:T.textSub,marginTop:2,letterSpacing:0.3}}>{s.label}</div>
              </div>
            ))}
          </div>
        </div>

        {/* 20-week block */}
        <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",boxShadow:T.shadow}}>
          <div style={{fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:1,textTransform:"uppercase",marginBottom:14}}>20-Week Block</div>
          <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>
            {Array.from({length:20},(_,i)=>i+1).map(w=>{
              const ph=getPhase(w,phases),isNow=w===week,isDone=weeksDone.includes(w);
              return <button key={w} onClick={()=>setWeek(w)} style={{flex:"1 0 0",minWidth:0,height:36,borderRadius:6,border:`2px solid ${isNow?ph.color:isDone?ph.color+"60":T.border}`,background:isNow?ph.color:isDone?ph.color+"22":T.bgInset,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:1}}>
                <span style={{fontSize:7,fontWeight:800,color:isNow?"#fff":isDone?ph.color:T.textSub}}>{w}</span>
                {isDone&&<span style={{fontSize:6,color:isNow?"#fff":ph.color}}>✓</span>}
              </button>;
            })}
          </div>
          <div style={{display:"flex",gap:12,marginTop:10,flexWrap:"wrap"}}>
            {[{c:accent.vol,l:"Volume"},{c:accent.str,l:"Intensity"},{c:accent.dld,l:"Deload"},{c:accent.peak,l:"Peak"}].map(x=>(
              <div key={x.l} style={{display:"flex",alignItems:"center",gap:4}}>
                <div style={{width:8,height:8,borderRadius:2,background:x.c}}/>
                <span style={{fontSize:10,color:T.textSub}}>{x.l}</span>
              </div>
            ))}
          </div>
        </div>

        {/* Training calendar */}
        <CalendarCard calendarMap={calendarMap} accent={accent}/>

        {/* Volume chart */}
        <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",boxShadow:T.shadow}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <div style={{fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:1,textTransform:"uppercase"}}>Weekly Volume</div>
            <div style={{display:"flex",background:T.bgInput,borderRadius:8,padding:2,gap:2}}>
              {[{id:"sets",label:"Sets"},{id:"weight",label:"kg"}].map(opt=>{
                const active=chartMetric===opt.id;
                return <button key={opt.id} onClick={()=>setChartMetric(opt.id)}
                  style={{padding:"4px 10px",borderRadius:6,border:"none",cursor:"pointer",fontSize:11,fontWeight:active?700:500,background:active?accent.acc:"transparent",color:active?"#fff":T.textSub,fontFamily:"inherit",transition:"all 0.15s"}}>
                  {opt.label}
                </button>;
              })}
            </div>
          </div>
          {(()=>{const sv=volData.sets[week]||0,wv=volData.weight[week]||0;return sv>0?(
            <div style={{display:"flex",gap:12,marginBottom:12,padding:"10px 12px",background:T.bgInset,borderRadius:T.r10,border:`1px solid ${T.border}`}}>
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:20,fontWeight:900,color:phase.color}}>{sv}</div>
                <div style={{fontSize:9,color:T.textSub,marginTop:1,textTransform:"uppercase",letterSpacing:0.5}}>Sets this week</div>
              </div>
              <div style={{width:1,background:T.border}}/>
              <div style={{textAlign:"center",flex:1}}>
                <div style={{fontSize:20,fontWeight:900,color:phase.color}}>{fmtVol(wv)}</div>
                <div style={{fontSize:9,color:T.textSub,marginTop:1,textTransform:"uppercase",letterSpacing:0.5}}>Volume this week</div>
              </div>
            </div>
          ):null;})()}
          <div style={{display:"flex",alignItems:"flex-end",gap:6,height:80}}>
            {chartWeeks.map(w=>{
              const v=vol[w]||0,h=maxVol>0?Math.max(4,(v/maxVol)*72):4;
              const ph=getPhase(w,phases),isNow=w===week;
              return <div key={w} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,cursor:"pointer"}} onClick={()=>setWeek(w)}>
                {isNow&&<div style={{fontSize:7,fontWeight:800,color:ph.color,whiteSpace:"nowrap"}}>{chartMetric==="weight"?fmtVol(v):v}</div>}
                <div style={{width:"100%",height:h,background:isNow?ph.color:ph.color+"44",borderRadius:"4px 4px 0 0",transition:"height 0.4s ease",minHeight:4}}/>
                <div style={{fontSize:8,color:isNow?T.text:T.textMuted,fontWeight:isNow?800:400}}>W{w}</div>
              </div>;
            })}
          </div>
        </div>

        {/* RPE Trend chart */}
        {(()=>{
          const rpeWeeks=chartWeeks.filter(w=>rpeByWeek[w]?.overall!=null);
          if(rpeWeeks.length===0)return null;
          const targetRpe=PHASE_TARGET_RPE[phase.phaseKey]||8;
          const allVals=rpeWeeks.flatMap(w=>[rpeByWeek[w].push,rpeByWeek[w].pull,rpeByWeek[w].legs].filter(v=>v!=null));
          const minV=Math.max(4,Math.min(...allVals)-1),maxV=Math.min(10,Math.max(...allVals)+0.5);
          const scaleY=v=>v==null?null:Math.round(((v-minV)/(maxV-minV))*60);
          const targetY=scaleY(Math.min(maxV,Math.max(minV,targetRpe)));

          // Sparse view: fewer than 3 weeks → show summary tiles instead of a chart
          const sparse=rpeWeeks.length<3;

          return(
            <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",boxShadow:T.shadow}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                <div style={{fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:1,textTransform:"uppercase"}}>RPE Trend</div>
                <div style={{fontSize:10,color:T.textSub}}>Target: <span style={{fontWeight:700,color:accent.acc}}>{targetRpe}</span></div>
              </div>
              <div style={{fontSize:10,color:T.textSub,marginBottom:12}}>
                {sparse?`${rpeWeeks.length} week${rpeWeeks.length>1?"s":""} of data — chart appears from 3 weeks`:"Average RPE per muscle group vs phase target"}
              </div>

              {sparse?(
                // ── SPARSE: summary tiles per week ──
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {rpeWeeks.map(w=>{
                    const d=rpeByWeek[w];
                    const muscles=[{k:"push",c:accent.push,l:"Push"},{k:"pull",c:accent.pull,l:"Pull"},{k:"legs",c:accent.legs,l:"Legs"}];
                    return(
                      <div key={w} style={{background:T.bgInset,borderRadius:T.r10,padding:"12px 14px",border:`1px solid ${T.border}`}}>
                        <div style={{fontSize:11,fontWeight:700,color:T.text,marginBottom:10}}>Week {w}</div>
                        <div style={{display:"flex",gap:8}}>
                          {muscles.map(({k,c,l})=>{
                            const v=d[k];
                            if(v==null)return null;
                            const diff=v-targetRpe;
                            const status=Math.abs(diff)<1?"on target":diff>0?"above":"below";
                            const statusCol=Math.abs(diff)<1?c:diff>0?"#ef4444":"#34c759";
                            // Bar fill proportional to RPE value (4–10 range)
                            const barPct=Math.round(((v-4)/6)*100);
                            return(
                              <div key={k} style={{flex:1,display:"flex",flexDirection:"column",gap:4}}>
                                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                                  <span style={{fontSize:9,fontWeight:700,color:c,textTransform:"uppercase",letterSpacing:0.5}}>{l}</span>
                                  <span style={{fontSize:14,fontWeight:900,color:statusCol}}>{v.toFixed(1)}</span>
                                </div>
                                {/* Mini bar */}
                                <div style={{height:4,background:T.border,borderRadius:2,overflow:"hidden"}}>

// ─── REST TIMER ───────────────────────────────────────────────────────────────
function RestTimer({color,defaultSecs,onDismiss}){
  const T=useTheme();
  const [remaining,setRemaining]=useState(defaultSecs);
  const [paused,setPaused]=useState(false);
  const beeped=useRef(false);
  const tick=useRef(null);

  // Fixed beep function — guard with ref so it fires only once
  const beep=useCallback(()=>{
    if(beeped.current)return;
    beeped.current=true;
    try{
      const ctx=new(window.AudioContext||window.webkitAudioContext)();
      [0,150,300].forEach(d=>{
        const o=ctx.createOscillator(),g=ctx.createGain();
        o.connect(g);g.connect(ctx.destination);
        o.frequency.value=880;g.gain.value=0.3;
        o.start(ctx.currentTime+d/1000);
        o.stop(ctx.currentTime+d/1000+0.12);
      });
    }catch(e){}
  },[]);

  useEffect(()=>{
    if(remaining<=0){beep();return;}
    if(paused)return;
    tick.current=setTimeout(()=>setRemaining(r=>r-1),1000);
    return()=>clearTimeout(tick.current);
  },[remaining,paused,beep]);

  const pct=remaining/defaultSecs;
  const done=remaining<=0;
  const display=`${Math.floor(remaining/60)}:${String(remaining%60).padStart(2,"0")}`;

  return(
    <div style={{background:T.bgCard,border:`2px solid ${done?"#34c759":color}`,borderRadius:T.r16,padding:"12px 14px",marginBottom:10,display:"flex",alignItems:"center",gap:12,boxShadow:T.shadow}}>
      <div style={{position:"relative",width:52,height:52,flexShrink:0}}>
        <svg width="52" height="52" viewBox="0 0 52 52">
          <circle cx="26" cy="26" r="22" fill="none" stroke={T.bgInput} strokeWidth="4"/>
          <circle cx="26" cy="26" r="22" fill="none" stroke={done?"#34c759":color} strokeWidth="4"
            strokeDasharray={`${pct*138} 138`} strokeDashoffset="34.5" strokeLinecap="round"
            style={{transition:"stroke-dasharray 0.9s linear"}} transform="rotate(-90 26 26)"/>
        </svg>
        <div style={{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
          <span style={{fontSize:11,fontWeight:800,color:done?"#34c759":color}}>{done?"✓":display}</span>
        </div>
      </div>
      <div style={{flex:1}}>
        <div style={{fontSize:13,fontWeight:700,color:T.text}}>{done?"Rest complete!":"Rest timer"}</div>
        <div style={{fontSize:11,color:T.textSub,marginTop:2}}>{done?"Tap ✕ when ready":paused?"Paused":"Running…"}</div>
      </div>
      <div style={{display:"flex",gap:6}}>
        {!done&&<button onClick={()=>setPaused(p=>!p)} style={{background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:14,color:T.text,display:"flex",alignItems:"center",justifyContent:"center"}}>{paused?"▶":"⏸"}</button>}
        <button onClick={onDismiss} style={{background:done?"#34c759":T.bgInput,border:`1px solid ${done?"#34c759":T.border}`,borderRadius:8,width:34,height:34,cursor:"pointer",fontSize:13,color:done?"#fff":T.text,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:700}}>✕</button>
      </div>
    </div>
  );
}
