// ─── SESSION SCREEN ───────────────────────────────────────────────────────────
const REST_OPTIONS=[{label:"90s",secs:90},{label:"2m",secs:120},{label:"3m",secs:180},{label:"5m",secs:300}];

function SessionScreen({sid,week,phase,phaseKey,META,getEntry,updSet,updNote,saved,getW1,getW2,phases,rpeAdj,sessionSwapsRef,onBack}){
  const T=useTheme();
  const meta=META[sid];
  const wts=useMemo(()=>meta.slot===1?getW1(meta.muscle):getW2(meta.muscle),[meta,getW1,getW2]);
  const [restSecs,setRestSecs]=useState(180);
  const [activeTimer,setActiveTimer]=useState(null);
  const swapKey=`${sid}|w${week}`;
  const [swaps,setSwapsState]=useState(()=>sessionSwapsRef.current[swapKey]||{});
  const setSwaps=updater=>{
    setSwapsState(prev=>{
      const next=typeof updater==="function"?updater(prev):updater;
      sessionSwapsRef.current[swapKey]=next;
      return next;
    });
  };
  const [openSub,setOpenSub]=useState(null);
  const targetRpe=PHASE_TARGET_RPE[phaseKey]||8;

  const handleTick=useCallback((exName,setIdx,currentlyDone,tWgt,tRepMin,fallbackRpe)=>{
    updSet(sid,week,exName,setIdx,"done",!currentlyDone,tWgt,tRepMin,currentlyDone?undefined:fallbackRpe);
    if(!currentlyDone)setActiveTimer({exName,setIdx});
    else if(activeTimer?.exName===exName&&activeTimer?.setIdx===setIdx)setActiveTimer(null);
  },[sid,week,updSet,activeTimer]);

  const applySwap=(origName,subDef)=>{
    setSwaps(s=>({...s,[origName]:subDef.name}));
    setOpenSub(null);
  };
  const clearSwap=(origName)=>{
    setSwaps(s=>{const n={...s};delete n[origName];return n;});
  };

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg}}>
      <div className="safe-top" style={{background:T.bgHeader,borderBottom:`2px solid ${meta.color}30`,padding:"0 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:T.backBtn,fontSize:15,cursor:"pointer",paddingTop:14,width:60,textAlign:"left",fontFamily:"inherit",fontWeight:500}}>← Back</button>
        <div style={{textAlign:"center"}}>
          <div style={{fontSize:13,fontWeight:800,letterSpacing:1,textTransform:"uppercase",color:meta.color,paddingTop:14}}>{meta.label}</div>
          <div style={{fontSize:10,color:T.textSub,marginTop:2}}>Week {week} · {phase.name}{meta.isS2&&" · Variations"}</div>
        </div>
        <div style={{fontSize:10,color:"#34c759",letterSpacing:0.5,width:60,textAlign:"right",fontWeight:600,paddingTop:14,transition:"opacity 0.3s",opacity:saved?1:0}}>Saved ✓</div>
      </div>
      <div style={{background:T.bgHeader,borderBottom:`1px solid ${T.border}`,padding:"8px 14px",flexShrink:0,display:"flex",alignItems:"center",gap:8}}>
        <span style={{fontSize:10,color:T.textSub,flexShrink:0}}>Rest:</span>
        <div style={{display:"flex",gap:4}}>
          {REST_OPTIONS.map(o=>{
            const isActive=restSecs===o.secs;
            const locked=!!activeTimer;
            return(
              <button key={o.secs} onClick={()=>{if(!locked)setRestSecs(o.secs);}}
                style={{padding:"4px 10px",borderRadius:6,border:`1.5px solid ${isActive?meta.color:T.border}`,background:isActive?meta.color+"18":T.bgInput,color:isActive?meta.color:locked?T.textMuted:T.textSub,fontSize:11,fontWeight:700,cursor:locked?"default":"pointer",fontFamily:"inherit",opacity:locked&&!isActive?0.45:1}}>
                {o.label}
              </button>
            );
          })}
        </div>
        {activeTimer&&<span style={{fontSize:9,color:T.textMuted,marginLeft:2}}>locked while running</span>}
      </div>
      {/* Sticky rest timer — outside scroll so it stays visible */}
      {activeTimer&&(
        <div style={{flexShrink:0,padding:"8px 12px 0",background:T.bg}}>
          <RestTimer key={`${activeTimer.exName}-${activeTimer.setIdx}`}
            color={meta.color} defaultSecs={restSecs} onDismiss={()=>setActiveTimer(null)}/>
        </div>
      )}
      <div className="scroll" style={{flex:1,padding:"10px 12px 0"}}>
        {meta.exercises.map(ex=>{
          // Resolve active name — may be swapped
          const swapName=swaps[ex.name];
          const activeName=swapName||ex.name;
          const isSwapped=!!swapName;

          // Weight array for active exercise
          const activeWts=isSwapped
            ? buildSubWeights(SUBS[ex.name]?.find(s=>s.name===swapName),wts[ex.name])
            : wts[activeName];

          const tSets=ex.sets[phaseKey]||3,tReps=ex.reps[phaseKey]||"10–12";
          const tWgt=activeWts?.[week-1]??"—";
          const tRepMin=tReps.includes("–")?tReps.split("–")[0]:tReps;
          // Log is keyed by activeName so substituted sets count toward progress
          const entry=getEntry(sid,week,activeName);
          const logSets=entry.sets||[];
          const doneN=logSets.filter(s=>s?.done).length;
          const allDone=doneN>=tSets;
          const subs=SUBS[ex.name]||[];
          const isOpen=openSub===ex.name;

          return <div key={ex.name} style={{background:T.bgCard,borderRadius:T.r10,padding:"12px 13px",marginBottom:10,border:`1px solid ${isSwapped?meta.color+"66":T.border}`,boxShadow:T.shadow,borderTop:`3px solid ${allDone?meta.color:isSwapped?meta.color+"88":T.border}`}}>
            {/* Exercise header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
              <div style={{flex:1}}>
                <div style={{fontSize:14,fontWeight:700,color:T.text,lineHeight:1.3}}>
                  {activeName}
                  {isSwapped&&<span style={{fontSize:9,fontWeight:700,color:meta.color,background:meta.color+"18",padding:"2px 6px",borderRadius:4,marginLeft:6,letterSpacing:0.5}}>SUB</span>}
                </div>
                {isSwapped&&<div style={{fontSize:10,color:T.textSub,marginTop:1}}>replaces {ex.name}</div>}
                <div style={{display:"flex",gap:5,flexWrap:"wrap",alignItems:"center",marginTop:4}}>
                  <span style={{fontSize:9,fontWeight:700,padding:"2px 6px",borderRadius:4,background:ex.type==="compound"?T.backBtn+"22":T.bgInput,color:ex.type==="compound"?T.backBtn:T.textSub,textTransform:"uppercase",letterSpacing:0.5}}>{ex.type}</span>
                  <span style={{fontSize:11,color:T.textSub}}>{tSets} × {tReps}</span>
                  <span style={{fontSize:13,fontWeight:800,color:meta.color}}>{tWgt}kg</span>
                  {(()=>{const adj=rpeAdj[`${sid}|${ex.name}`];if(!adj||Math.abs(adj-1)<0.01)return null;const up=adj>1;return<span style={{fontSize:9,fontWeight:700,color:up?"#34c759":"#f97316",background:up?"#34c75920":"#f9731620",padding:"2px 5px",borderRadius:4}}>{up?"↑":"↓"}RPE adj</span>;})()}
                </div>
              </div>
              <div style={{textAlign:"right",flexShrink:0,paddingLeft:8}}>
                <div style={{fontSize:17,fontWeight:900,color:allDone?meta.color:T.textMuted,lineHeight:1}}>{doneN}/{tSets}</div>
                {allDone&&<div style={{fontSize:9,color:meta.color,letterSpacing:1,fontWeight:800}}>DONE</div>}
              </div>
            </div>

            {/* Substitute button + picker */}
            {subs.length>0&&(
              <div style={{marginBottom:8}}>
                {!isSwapped?(
                  <button onClick={()=>setOpenSub(isOpen?null:ex.name)}
                    style={{background:"transparent",border:`1px dashed ${T.border}`,borderRadius:6,padding:"4px 8px",fontSize:11,color:T.textSub,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4}}>
                    <span style={{fontSize:12}}>⇄</span> Substitute exercise
                  </button>
                ):(
                  <button onClick={()=>clearSwap(ex.name)}
                    style={{background:meta.color+"15",border:`1px solid ${meta.color}55`,borderRadius:6,padding:"4px 8px",fontSize:11,color:meta.color,cursor:"pointer",fontFamily:"inherit",display:"flex",alignItems:"center",gap:4,fontWeight:600}}>
                    <span style={{fontSize:12}}>✕</span> Remove substitution
                  </button>
                )}
                {isOpen&&!isSwapped&&(
                  <div style={{marginTop:5,background:T.bgInset,borderRadius:T.r10,border:`1px solid ${T.border}`,overflow:"hidden"}}>
                    {subs.map((sub,si)=>{
                      const subWts=buildSubWeights(sub,wts[ex.name]);
                      const subWgt=subWts[week-1]??0;
                      return <button key={si} onClick={()=>applySwap(ex.name,sub)}
                        style={{width:"100%",background:"transparent",border:"none",borderBottom:si<subs.length-1?`1px solid ${T.border}`:"none",padding:"10px 12px",cursor:"pointer",textAlign:"left",fontFamily:"inherit",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                        <div style={{flex:1,minWidth:0}}>
                          <div style={{fontSize:13,fontWeight:600,color:T.text,marginBottom:1}}>{sub.name}</div>
                          <div style={{fontSize:10,color:T.textSub}}>{sub.note}</div>
                        </div>
                        <div style={{textAlign:"right",flexShrink:0}}>
                          <div style={{fontSize:13,fontWeight:800,color:meta.color}}>{subWgt}kg</div>
                          <div style={{fontSize:9,color:T.textMuted}}>{tReps} reps</div>
                        </div>
                      </button>;
                    })}
                  </div>
                )}
              </div>
            )}

            {/* Set rows */}
            <div style={{background:T.bgInset,borderRadius:8,overflow:"hidden",marginBottom:8}}>
              {/* Column headers — no SET column */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 72px 40px",gap:4,padding:"5px 10px",borderBottom:`1px solid ${T.border}`}}>
                {["WEIGHT","REPS","RPE","✓"].map(h=><span key={h} style={{fontSize:9,letterSpacing:0.8,color:T.textMuted,fontWeight:700,textAlign:"center",textTransform:"uppercase"}}>{h}</span>)}
              </div>
              {Array.from({length:tSets},(_,i)=>{
                const sd=logSets[i]||{},isDone=!!sd.done;
                const ic=isDone?T.inputDone:T.inputUndone;
                const rpe=sd.rpe?String(sd.rpe):"";
                const rpeNum=parseInt(rpe)||0;
                const rpeColor=rpeNum>=9?"#ef4444":rpeNum>=7?meta.color:T.textSub;
                const isActiveSet=activeTimer?.exName===activeName&&activeTimer?.setIdx===i;
                const rpeRange=PHASE_RPE_RANGE[phaseKey]||"7–8";
                // Starting value when first pressing + or −: lower bound of phase range
                const rpeLower=parseInt(rpeRange.split("–")[0])||7;
                const hasRpe=!!rpe;
                return <React.Fragment key={i}>
                  <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 72px 40px",gap:4,padding:"5px 10px",alignItems:"center",borderBottom:(!isDone||!rpe||Math.abs((parseInt(rpe)||0)-targetRpe)<1)?`1px solid ${T.borderMid}`:"none",background:isDone?meta.color+"14":isActiveSet?meta.color+"08":T.bgRow,borderLeft:`3px solid ${isDone?meta.color:isActiveSet?meta.color+"80":"transparent"}`}}>
                  <input type="text" inputMode="decimal" placeholder={String(tWgt)} value={sd.weight??""} onChange={e=>updSet(sid,week,activeName,i,"weight",e.target.value)}
                    style={{background:T.bgInput,border:`1.5px solid ${isDone?meta.color+"55":T.border}`,borderRadius:8,fontSize:16,fontWeight:700,fontFamily:"inherit",padding:"8px 4px",textAlign:"center",width:"100%",outline:"none",color:ic,height:40}}/>
                  <input type="number" inputMode="numeric" placeholder={tRepMin} value={sd.reps??""} onChange={e=>updSet(sid,week,activeName,i,"reps",e.target.value)}
                    style={{background:T.bgInput,border:`1.5px solid ${isDone?meta.color+"55":T.border}`,borderRadius:8,fontSize:16,fontWeight:700,fontFamily:"inherit",padding:"8px 4px",textAlign:"center",width:"100%",outline:"none",color:ic,height:40}}/>
                  {/* RPE stepper — greyed when undone, coloured when done */}
                  <div style={{display:"flex",alignItems:"center",background:T.bgInput,borderRadius:8,border:`1px solid ${isDone&&hasRpe?T.border:T.border}`,height:40,overflow:"hidden",opacity:isDone?1:0.5}}>
                    <button onClick={()=>updSet(sid,week,activeName,i,"rpe",Math.max(1,hasRpe?rpeNum-1:rpeLower))}
                      style={{background:"transparent",border:"none",borderRight:`1px solid ${T.border}`,width:24,height:"100%",cursor:"pointer",fontSize:16,color:T.textSub,display:"flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0}}>−</button>
                    <div style={{flex:1,textAlign:"center",fontSize:hasRpe?14:11,fontWeight:hasRpe?800:500,color:isDone&&hasRpe?rpeColor:T.textMuted,letterSpacing:hasRpe?0:-0.3}}>
                      {hasRpe?rpe:rpeRange}
                    </div>
                    <button onClick={()=>updSet(sid,week,activeName,i,"rpe",Math.min(10,hasRpe?rpeNum+1:rpeLower))}
                      style={{background:"transparent",border:"none",borderLeft:`1px solid ${T.border}`,width:24,height:"100%",cursor:"pointer",fontSize:16,color:T.textSub,display:"flex",alignItems:"center",justifyContent:"center",padding:0,flexShrink:0}}>+</button>
                  </div>
                  <button onClick={()=>handleTick(activeName,i,isDone,tWgt,tRepMin,rpeLower)}
                    style={{borderRadius:8,fontSize:15,fontWeight:900,width:38,height:40,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s",background:isDone?meta.color:T.bgInput,border:`2px solid ${isDone?meta.color:T.border}`,color:isDone?"#fff":T.textMuted}}>
                    {isDone?"✓":"○"}
                  </button>
                </div>
                {/* Inline RPE hint */}
                {isDone&&hasRpe&&(()=>{
                  const diff=rpeNum-targetRpe;
                  if(Math.abs(diff)<1)return null;
                  const tooHard=diff>0,strong=Math.abs(diff)>=2;
                  const msg=tooHard?(strong?"Very hard — consider dropping weight next set":"Slightly above target — monitor next set"):(strong?"Too easy — go heavier next set or next week":"Below target — you have more in the tank");
                  const col=tooHard?"#ef4444":"#34c759";
                  return <div style={{fontSize:10,color:col,fontWeight:600,padding:"4px 10px 5px",borderBottom:`1px solid ${T.borderMid}`,background:isDone?meta.color+"14":T.bgRow,display:"flex",alignItems:"center",gap:5}}>
                    <span>{tooHard?"⚠️":"💪"}</span>{msg}
                  </div>;
                })()}
                </React.Fragment>;
              })}
            </div>
            <NoteField note={entry.note||""} onChange={v=>updNote(sid,week,activeName,v)}/>
          </div>;
        })}
        <div style={{height:24}}/>
      </div>
    </div>
  );
}

// ─── EXERCISE HISTORY CHART ───────────────────────────────────────────────────
function ExerciseHistoryChart({exName,allLog,phases,accent,onBack}){
  const T=useTheme();
  const exMuscle=useMemo(()=>{
    for(const m of ["push","pull","legs"]){
      if(BASE_EX[m]?.some(e=>e.name===exName))return m;
      if(S2_EX[m]?.some(e=>e.name===exName))return m;
    }
    return "push";
  },[exName]);
  const exColor=exMuscle==="push"?exColor:exMuscle==="pull"?accent.pull:accent.legs;
  // Gather all logged sets for this exercise across all weeks and sessions
  const history=useMemo(()=>{
    const entries=[];
    Object.entries(allLog).forEach(([key,val])=>{
      if(!key.includes(`|${exName}`))return;
      // Handle both "push-1|w3|ExName" and "b1|push-1|w3|ExName"
      const m=key.match(/(?:b\d+\|)?([a-z]+-[12])\|w(\d+)\|/);
      if(!m)return;
      const sid=m[1],wk=parseInt(m[2]);
      const done=(val.sets||[]).filter(s=>s?.done&&s.weight);
      if(!done.length)return;
      const maxW=Math.max(...done.map(s=>parseFloat(s.weight)||0));
      const totalVol=done.reduce((s,x)=>(parseFloat(x.weight)||0)*(parseFloat(x.reps)||0)+s,0);
      const avgRpeVal=done.filter(s=>s.rpe).length>=1?done.filter(s=>s.rpe).reduce((s,x)=>s+parseInt(x.rpe),0)/done.filter(s=>s.rpe).length:null;
      // Label archived entries so chart can distinguish blocks
      const isArchived=key.startsWith("b");
      const blockLabel=isArchived?key.match(/^b(\d+)/)?.[1]:null;
      entries.push({wk,sid,maxW,totalVol,avgRpe:avgRpeVal,sets:done,blockLabel});
    });
    return entries.sort((a,b)=>a.wk-b.wk||a.sid.localeCompare(b.sid));
  },[allLog,exName]);

  const allWeights=history.map(h=>h.maxW);
  const pb=allWeights.length?Math.max(...allWeights):0;
  const lastEntry=history[history.length-1];

  // Chart: max weight per week
  const weeks=[...new Set(history.map(h=>h.wk))].sort((a,b)=>a-b);
  const maxWPerWeek=Object.fromEntries(weeks.map(w=>[w,Math.max(...history.filter(h=>h.wk===w).map(h=>h.maxW))]));
  const chartMin=pb?Math.max(0,Math.min(...Object.values(maxWPerWeek))*0.9):0;
  const chartMax=pb?pb*1.05:100;
  const scaleY=v=>Math.round(((v-chartMin)/(chartMax-chartMin))*64);

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg}}>
      <div className="safe-top" style={{background:T.bgHeader,borderBottom:`1px solid ${T.border}`,padding:"0 16px 12px",display:"flex",alignItems:"center",gap:12,flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:T.backBtn,fontSize:15,cursor:"pointer",paddingTop:14,fontFamily:"inherit",fontWeight:500,flexShrink:0}}>← Back</button>
        <div style={{paddingTop:14,minWidth:0}}>
          <div style={{fontSize:13,fontWeight:800,color:T.text,lineHeight:1.3}}>{exName}</div>
          <div style={{fontSize:10,color:T.textSub,marginTop:2}}>{history.length} sessions logged</div>
        </div>
      </div>
      <div className="scroll" style={{flex:1,padding:"14px 14px 0"}}>
        {history.length===0&&(
          <div style={{color:T.textSub,textAlign:"center",marginTop:60,fontSize:14}}>No sets logged for this exercise yet.</div>
        )}
        {history.length>0&&<>
          {/* PB + last session summary */}
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
            <div style={{background:T.bgCard,borderRadius:T.r10,padding:"14px",boxShadow:T.shadow,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:10,color:T.textSub,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Personal Best</div>
              <div style={{fontSize:22,fontWeight:900,color:exColor}}>{pb}kg</div>
              <div style={{fontSize:10,color:T.textMuted,marginTop:2}}>Week {history.find(h=>h.maxW===pb)?.wk}</div>
            </div>
            <div style={{background:T.bgCard,borderRadius:T.r10,padding:"14px",boxShadow:T.shadow,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:10,color:T.textSub,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Last Session</div>
              <div style={{fontSize:22,fontWeight:900,color:T.text}}>{lastEntry?.maxW}kg</div>
              <div style={{fontSize:10,color:T.textMuted,marginTop:2}}>Week {lastEntry?.wk} · {lastEntry?.sets.length} sets</div>
            </div>
          </div>

          {/* Weight over time chart */}
          {weeks.length>1&&(
            <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",marginBottom:14,boxShadow:T.shadow,border:`1px solid ${T.border}`}}>
              <div style={{fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Max Weight Per Week</div>
              <div style={{position:"relative",height:80,marginBottom:8}}>
                <svg width="100%" height="80" style={{overflow:"visible"}}>
                  {/* Grid lines */}
                  {[0,32,64].map(y=>(
                    <line key={y} x1="0" y1={80-y} x2="100%" y2={80-y} stroke={T.border} strokeWidth="1" opacity="0.5"/>
                  ))}
                  {/* Weight line */}
                  {(()=>{
                    const pts=weeks.map((w,xi)=>{
                      const v=maxWPerWeek[w];
                      const x=(xi/(weeks.length-1))*100;
                      const y=80-scaleY(v);
                      return{x,y,v,w};
                    });
                    const d=pts.map((p,i)=>`${i===0?"M":"L"}${p.x}% ${p.y}`).join(" ");
                    const ph=getPhase(pts[pts.length-1]?.w||1,phases);
                    return <g>
                      <path d={d} fill="none" stroke={exColor} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"/>
                      {pts.map((p,i)=>{
                        const isPb=p.v===pb;
                        return <g key={i}>
                          <circle cx={`${p.x}%`} cy={p.y} r={isPb?5:3} fill={isPb?"#f97316":exColor}/>
                          {isPb&&<text x={`${p.x}%`} y={p.y-8} textAnchor="middle" fontSize="9" fill="#f97316" fontWeight="800">PB</text>}
                        </g>;
                      })}
                    </g>;
                  })()}
                </svg>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                {weeks.map(w=>(
                  <div key={w} style={{fontSize:8,color:T.textMuted,fontWeight:400}}>W{w}</div>
                ))}
              </div>
              {/* Y axis labels */}
              <div style={{display:"flex",justifyContent:"space-between",marginTop:8,paddingTop:8,borderTop:`1px solid ${T.borderMid}`}}>
                <div style={{fontSize:10,color:T.textSub}}>Low: {Math.min(...Object.values(maxWPerWeek))}kg</div>
                <div style={{fontSize:10,color:exColor,fontWeight:700}}>Best: {pb}kg</div>
              </div>
            </div>
          )}

          {/* Volume trend */}
          {weeks.length>1&&(()=>{
            const volPerWeek=Object.fromEntries(weeks.map(w=>[w,history.filter(h=>h.wk===w).reduce((s,h)=>s+h.totalVol,0)]));
            const maxV=Math.max(...Object.values(volPerWeek));
            return(
              <div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",marginBottom:14,boxShadow:T.shadow,border:`1px solid ${T.border}`}}>
                <div style={{fontSize:11,fontWeight:700,color:T.textSub,letterSpacing:1,textTransform:"uppercase",marginBottom:12}}>Volume Load Per Week (kg×reps)</div>
                <div style={{display:"flex",alignItems:"flex-end",gap:4,height:52}}>
                  {weeks.map(w=>{
                    const v=volPerWeek[w]||0;
                    const h=maxV>0?Math.max(4,(v/maxV)*48):4;
                    const ph=getPhase(w,phases);
                    return <div key={w} style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
                      <div style={{width:"100%",height:h,background:ph.color+"88",borderRadius:"3px 3px 0 0",minHeight:4}}/>
                      <div style={{fontSize:7,color:T.textMuted}}>W{w}</div>
                    </div>;
                  })}
                </div>
              </div>
            );
          })()}

          {/* All sessions list */}
          <div style={{fontSize:9,letterSpacing:3,color:T.textSub,marginBottom:8,textTransform:"uppercase",fontWeight:700}}>All Sessions</div>
          {[...history].reverse().map((h,i)=>{
            const ph=getPhase(h.wk,phases);
            return <div key={i} style={{background:T.bgCard,border:`1px solid ${T.border}`,borderRadius:T.r10,padding:"11px 13px",marginBottom:6,boxShadow:T.shadow}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
                <div style={{fontSize:12,fontWeight:700,color:T.text}}>Week {h.wk}</div>
                <div style={{display:"flex",gap:6,alignItems:"center"}}>
                  {h.avgRpe&&<span style={{fontSize:10,color:parseInt(h.avgRpe)>=9?"#ef4444":exColor,fontWeight:700}}>RPE {h.avgRpe.toFixed(1)}</span>}
                  <span style={{fontSize:9,background:ph.color+"20",color:ph.color,padding:"2px 7px",borderRadius:3,fontWeight:700}}>{ph.name}</span>
                </div>
              </div>
              <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                {h.sets.map((s,si)=>(
                  <div key={si} style={{background:T.bgInput,borderRadius:6,padding:"4px 9px",fontSize:12}}>
                    <span style={{color:T.text,fontWeight:700}}>{s.weight}kg</span>
                    <span style={{color:T.textMuted}}> × </span>
                    <span style={{color:T.text}}>{s.reps||"—"}</span>
                    {s.rpe&&<span style={{color:parseInt(s.rpe)>=9?"#ef4444":exColor,fontWeight:700}}> @{s.rpe}</span>}
                  </div>
                ))}
              </div>
            </div>;
          })}
        </>}
        <div className="safe-bottom" style={{height:24}}/>
      </div>
    </div>
  );
}

// ─── HISTORY SCREEN ───────────────────────────────────────────────────────────
function HistoryScreen({log,phases,META,blocks,accent,onBack}){
  const T=useTheme();
  const [selectedEx,setSelectedEx]=useState(null);

  // Combine current log with all archived block logs for the chart
  const allLog=useMemo(()=>{
    const combined={};
    // Archived blocks first — prefix keys with block number to avoid collisions
    (blocks||[]).forEach(b=>{
      Object.entries(b.log||{}).forEach(([k,v])=>{combined[`b${b.blockNum}|${k}`]=v;});
    });
    // Current block — use keys as-is
    Object.entries(log).forEach(([k,v])=>{combined[k]=v;});
    return combined;
  },[log,blocks]);

  const entries=useMemo(()=>Object.entries(log)
    .filter(([,v])=>v.sets?.some(s=>s?.done))
    .map(([key,val])=>{const p=key.split("|");return{sid:p[0],week:parseInt(p[1].replace("w","")),ex:p.slice(2).join("|"),...val};})
    .sort((a,b)=>b.week-a.week||a.sid.localeCompare(b.sid))
  ,[log]);
  const byWeek=useMemo(()=>{const bw={};entries.forEach(e=>{if(!bw[e.week])bw[e.week]=[];bw[e.week].push(e);});return bw;},[entries]);

  if(selectedEx){
    return <ExerciseHistoryChart exName={selectedEx} allLog={allLog} phases={phases} accent={accent} onBack={()=>setSelectedEx(null)}/>;
  }

  return(
    <div style={{display:"flex",flexDirection:"column",height:"100%",background:T.bg}}>
      <div className="safe-top" style={{background:T.bgHeader,borderBottom:`1px solid ${T.border}`,padding:"0 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between",flexShrink:0}}>
        <button onClick={onBack} style={{background:"none",border:"none",color:T.backBtn,fontSize:15,cursor:"pointer",paddingTop:14,width:60,textAlign:"left",fontFamily:"inherit",fontWeight:500}}>← Back</button>
        <div style={{fontSize:13,fontWeight:800,letterSpacing:1,textTransform:"uppercase",color:T.text,paddingTop:14}}>LOG HISTORY</div>
        <div style={{width:60}}/>
      </div>
      <div className="scroll" style={{flex:1,padding:"12px 12px 0"}}>
        {/* Archived blocks */}
        {(blocks||[]).map(b=>{
          const blockEntries=Object.entries(b.log||{})
            .filter(([,v])=>v.sets?.some(s=>s?.done))
            .map(([key,val])=>{const p=key.split("|");return{week:parseInt(p[1].replace("w","")),ex:p.slice(2).join("|"),...val};})
            .sort((a,b2)=>b2.week-a.week);
          const blockByWeek={};
          blockEntries.forEach(e=>{if(!blockByWeek[e.week])blockByWeek[e.week]=[];blockByWeek[e.week].push(e);});
          return(
            <div key={b.blockNum} style={{marginBottom:20}}>
              <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:T.textMuted,marginBottom:8,display:"flex",alignItems:"center",gap:8,textTransform:"uppercase"}}>
                <div style={{flex:1,height:1,background:T.border}}/>
                <span>Block {b.blockNum} Archive</span>
                <div style={{flex:1,height:1,background:T.border}}/>
              </div>
              {Object.entries(blockByWeek).sort((a,b2)=>b2[0]-a[0]).map(([wk,wkE])=>{
                const ph=getPhase(parseInt(wk),phases);

              const ph=getPhase(parseInt(wk),phases);

// ─── MAXES TAB ────────────────────────────────────────────────────────────────
// Pre-compute which S2 exercises each S1 exercise drives (from S2_MAP)
const S1_DRIVES_S2=(()=>{
  const map={};
  Object.values(S2_MAP).forEach(mappings=>{
    mappings.forEach(m=>{
      if(!map[m.src])map[m.src]=[];
      if(!map[m.src].includes(m.s2))map[m.src].push(m.s2);
    });
  });
  return map;
})();

const MUSCLE_GROUPS=[
  {key:"push",label:"Push",exercises:["Barbell Bench Press","Barbell Shoulder Press","Cable Standing Chest Press","Cable Tricep Pushdown (Single Arm)","Cable Bent-Over Tricep Extension","Dumbbell Lateral Raise"]},
  {key:"pull",label:"Pull",exercises:["Machine Lat Pulldown","Cable Seated Row","Cable Pullover with Rope","Dumbbell Preacher Curl","Barbell Reverse Curl","Dumbbell Lateral Raise (Rear Delt)","Machine Seated Reverse Fly"]},
  {key:"legs",label:"Legs",exercises:["Sled 45° Leg Press","Machine Single Leg Extension","Machine Standing Leg Curl","Smith Machine Calf Raise","Machine Seated Hip Adduction","Machine Seated Hip Abduction"]},
];
function MaxesTab({maxes,onSave}){
  const T=useTheme();
  const accent=T.accent;
  const MC={push:accent.push,pull:accent.pull,legs:accent.legs};
  const [draft,setDraft]=useState(()=>Object.fromEntries(Object.entries(maxes).map(([k,v])=>[k,{weight:String(v.weight||""),reps:String(v.reps||""),muscle:v.muscle}])));
  const [confirmed,setConfirmed]=useState(false);
  const [showConfirm,setShowConfirm]=useState(false);
  // Sync draft if maxes change from outside (e.g. after a recalculate)
  useEffect(()=>{
    setDraft(Object.fromEntries(Object.entries(maxes).map(([k,v])=>[k,{weight:String(v.weight||""),reps:String(v.reps||""),muscle:v.muscle}])));
  },[maxes]);
  const upd=(ex,f,v)=>{if(f==="weight")v=v.replace(",",".");setDraft(d=>({...d,[ex]:{...d[ex],[f]:v}}));};
  const [validationErr,setValidationErr]=useState(null);
  const handleSubmit=()=>{
    const out={};let ok=true;let missing=[];
    Object.entries(draft).forEach(([ex,{weight,reps,muscle}])=>{
      const w=parseFloat(weight),r=parseFloat(reps);
      if(!w||!r||w<=0||r<=0){ok=false;missing.push(ex);return;}
      out[ex]={weight:w,reps:r,muscle};
    });
    if(!ok){
      setValidationErr(`Missing values for: ${missing.slice(0,2).join(", ")}${missing.length>2?` + ${missing.length-2} more`:""}`);
      setTimeout(()=>setValidationErr(null),4000);
      return;
    }
    setValidationErr(null);
    onSave(out);setConfirmed(true);setShowConfirm(false);setTimeout(()=>setConfirmed(false),3000);
  };
  const est1rm=ex=>{const d=draft[ex];const w=parseFloat(d?.weight),r=parseFloat(d?.reps);if(!w||!r)return null;return Math.round(epley(w,r));};
  return(
    <div className="tab-enter" style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="safe-top" style={{background:T.bgHeader,padding:"0 18px 14px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",paddingTop:14}}>
          <div style={{fontSize:22,fontWeight:800,color:T.text}}>My Maxes</div>
          {confirmed&&<div style={{fontSize:12,color:"#34c759",fontWeight:600,paddingBottom:2}}>✓ Updated!</div>}
        </div>
        <div style={{fontSize:12,color:T.textSub,marginTop:4,lineHeight:1.5}}>Enter your current max weight and reps for each exercise, then scroll down to recalculate the program.</div>
      </div>
      <div className="scroll" style={{flex:1,padding:"14px 14px 0"}}>
        {MUSCLE_GROUPS.map(mg=>{
          const mc=MC[mg.key];
          return <div key={mg.key} style={{marginBottom:20}}>
            <div style={{fontSize:11,fontWeight:800,color:mc,letterSpacing:2,textTransform:"uppercase",marginBottom:8,display:"flex",alignItems:"center",gap:6}}>
              <div style={{width:8,height:8,borderRadius:2,background:mc}}/>{mg.label}
            </div>
            {mg.exercises.map(ex=>{
              const d=draft[ex]||{weight:"",reps:"",muscle:mg.key},orm=est1rm(ex);
              const drives=S1_DRIVES_S2[ex];
              return <div key={ex} style={{background:T.bgCard,borderRadius:T.r10,padding:"12px 14px",marginBottom:8,border:`1px solid ${T.border}`,boxShadow:T.shadow}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:drives?4:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:T.text,flex:1,paddingRight:8}}>{ex}</div>
                  {orm&&<div style={{fontSize:11,fontWeight:700,color:mc,background:mc+"20",padding:"2px 8px",borderRadius:6,flexShrink:0}}>~{orm}kg 1RM</div>}
                </div>
                {drives&&(
                  <div style={{fontSize:10,color:T.textMuted,marginBottom:8,display:"flex",alignItems:"center",gap:4}}>
                    <span style={{color:mc,fontWeight:600}}>→</span>
                    <span>drives <span style={{color:mc,fontWeight:600}}>{drives[0]}</span>{drives.length>1?` + ${drives.length-1} more`:""} in Session 2</span>
                  </div>
                )}
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
                  <div>
                    <div style={{fontSize:9,color:T.textSub,letterSpacing:1,textTransform:"uppercase",marginBottom:4,fontWeight:600}}>Max Weight (kg)</div>
                    <input type="text" inputMode="decimal" placeholder="e.g. 100" value={d.weight} onChange={e=>upd(ex,"weight",e.target.value)}
                      style={{width:"100%",background:T.bgInput,border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:16,fontWeight:700,padding:"9px 10px",outline:"none",fontFamily:"inherit",color:T.text}}/>
                  </div>
                  <div>
                    <div style={{fontSize:9,color:T.textSub,letterSpacing:1,textTransform:"uppercase",marginBottom:4,fontWeight:600}}>Reps at that weight</div>
                    <input type="number" inputMode="numeric" placeholder="e.g. 5" value={d.reps} onChange={e=>upd(ex,"reps",e.target.value)}
                      style={{width:"100%",background:T.bgInput,border:`1.5px solid ${T.border}`,borderRadius:8,fontSize:16,fontWeight:700,padding:"9px 10px",outline:"none",fontFamily:"inherit",color:T.text}}/>
                  </div>
                </div>
              </div>;
            })}
          </div>;
        })}
        {validationErr&&(
          <div style={{background:"#ef444418",border:"1px solid #ef444440",borderRadius:T.r10,padding:"10px 14px",marginBottom:10,fontSize:12,color:"#ef4444",fontWeight:600}}>
            ⚠️ {validationErr}
          </div>
        )}
        {!showConfirm
          ?<button onClick={()=>setShowConfirm(true)} style={{width:"100%",background:accent.push,border:"none",borderRadius:T.r16,padding:"16px",color:"#fff",fontSize:15,fontWeight:700,cursor:"pointer",marginBottom:12,fontFamily:"inherit"}}>
            Recalculate Program from These Maxes
          </button>
          :<div style={{background:T.bgCard,borderRadius:T.r16,padding:"16px",marginBottom:12,border:`1.5px solid ${accent.push}`,boxShadow:T.shadow}}>
            <div style={{fontSize:14,fontWeight:700,color:T.text,marginBottom:6}}>⚠️ Confirm recalculation</div>
            <div style={{fontSize:12,color:T.textSub,marginBottom:14,lineHeight:1.5}}>Recalculates all 20 weeks. Logged sets are not affected.</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setShowConfirm(false)} style={{flex:1,background:T.bgInput,border:`1px solid ${T.border}`,borderRadius:T.r10,padding:"12px",fontSize:14,fontWeight:600,cursor:"pointer",fontFamily:"inherit",color:T.text}}>Cancel</button>
              <button onClick={handleSubmit} style={{flex:2,background:accent.push,border:"none",borderRadius:T.r10,padding:"12px",fontSize:14,fontWeight:700,cursor:"pointer",color:"#fff",fontFamily:"inherit"}}>Yes, Recalculate</button>
            </div>
          </div>}
        <div className="safe-bottom" style={{height:24}}/>
      </div>
    </div>
  );
}

// ─── SETTINGS TAB ─────────────────────────────────────────────────────────────
function SettingsTab({settings,onUpdate,onReset,onExport,onImport}){
  const T=useTheme();
  const accent=T.accent;
  const [confirmReset,setConfirmReset]=useState(false);
  const [resetDone,setResetDone]=useState(false);
  const [importErr,setImportErr]=useState(null);
  const [importOk,setImportOk]=useState(false);
  const fileRef=useRef(null);

  const handleReset=()=>{onReset();setConfirmReset(false);setResetDone(true);setTimeout(()=>setResetDone(false),3000);};

  const handleFileImport=e=>{
    const file=e.target.files?.[0];if(!file)return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const ok=onImport(ev.target.result);
      if(ok){setImportOk(true);setImportErr(null);setTimeout(()=>setImportOk(false),3000);}
      else{setImportErr("Invalid backup file — check it's a PPL Logger export.");setTimeout(()=>setImportErr(null),4000);}
    };
    reader.readAsText(file);
    e.target.value="";
  };

  return(
    <div className="tab-enter" style={{display:"flex",flexDirection:"column",height:"100%"}}>
      <div className="safe-top" style={{background:T.bgHeader,padding:"0 18px 14px",borderBottom:`1px solid ${T.border}`,flexShrink:0}}>

        <div style={{background:T.bgCard,borderRadius:T.r16,overflow:"hidden",border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20}}>
          {[{id:"light",label:"☀️  Light Mode"},{id:"dark",label:"🌙  Dark Mode"}].map((m,idx)=>(
            <button key={m.id} onClick={()=>onUpdate({mode:m.id})}
              style={{width:"100%",display:"flex",justifyContent:"space-between",alignItems:"center",padding:"16px",background:"transparent",border:"none",borderBottom:idx===0?`1px solid ${T.border}`:"none",cursor:"pointer",fontFamily:"inherit"}}>
              <span style={{fontSize:15,color:T.text,fontWeight:500}}>{m.label}</span>
              <div style={{width:22,height:22,borderRadius:"50%",border:`2px solid ${settings.mode===m.id?accent.acc:T.border}`,background:settings.mode===m.id?accent.acc:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                {settings.mode===m.id&&<div style={{width:8,height:8,borderRadius:"50%",background:"#fff"}}/>}
              </div>
            </button>
          ))}
        </div>

        <div style={{fontSize:9,letterSpacing:3,color:T.textSub,marginBottom:8,textTransform:"uppercase",fontWeight:700}}>Accent Colour</div>
        <div style={{background:T.bgCard,borderRadius:T.r16,padding:"14px",border:`1px solid ${T.border}`,boxShadow:T.shadow,marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            {ACCENTS.map(a=>{
              const active=settings.accent===a.id;
              return <button key={a.id} onClick={()=>onUpdate({accent:a.id})}
                style={{display:"flex",alignItems:"center",gap:10,padding:"12px",borderRadius:T.r10,border:`2px solid ${active?a.push:T.border}`,background:active?a.push+"15":T.bgInput,cursor:"pointer",textAlign:"left",fontFamily:"inherit"}}>
                <div style={{display:"flex",gap:3,flexShrink:0}}>
                  {[a.push,a.pull,a.legs].map((c,i)=><div key={i} style={{width:10,height:10,borderRadius:2,background:c}}/>)}

                <span style={{fontSize:13,fontWeight:active?700:500,color:active?a.push:T.text}}>{a.label}</span>

      </div>
    </div>
  );
}

// ─── SHARED ───────────────────────────────────────────────────────────────────
function HalfCard({label,color,stats,onOpen,subtitle}){
  const T=useTheme();
  const done=stats.pct>=1;
  return <button onClick={onOpen} style={{width:"100%",background:"transparent",border:"none",padding:"14px 12px",cursor:"pointer",textAlign:"left",display:"block"}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:13,fontWeight:800,color,marginBottom:2,letterSpacing:0.3}}>{label}</div>
      {done&&<span style={{fontSize:10,fontWeight:900,color}}>✓</span>}
    </div>
    {subtitle&&<div style={{fontSize:9,color:T.textSub,marginBottom:4}}>{subtitle}</div>}
    <div style={{height:3,background:T.border,borderRadius:2,marginTop:6,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${stats.pct*100}%`,background:color,borderRadius:2,transition:"width 0.3s"}}/>
    </div>
    <div style={{fontSize:9,color:stats.done>0?color:T.textMuted,marginTop:5,fontWeight:600,letterSpacing:0.3}}>{stats.done}/{stats.total} sets</div>
  </button>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
