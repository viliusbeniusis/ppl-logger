<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>PPL Logger</title>

  <!-- ── PWA / iOS Home Screen meta tags ─────────────────────────────────── -->
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="PPL Logger" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#ffffff" />

  <!-- Inline SVG icon as data URI for apple-touch-icon -->
  <link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23f2f2f7'/%3E%3Crect x='30' y='54' width='120' height='18' rx='9' fill='%23f97316'/%3E%3Crect x='30' y='81' width='90' height='18' rx='9' fill='%233b82f6'/%3E%3Crect x='30' y='108' width='105' height='18' rx='9' fill='%2322c55e'/%3E%3C/svg%3E" />

  <!-- Inline web app manifest -->
  <link rel="manifest" href="data:application/json,%7B%22name%22%3A%22PPL+Logger%22%2C%22short_name%22%3A%22PPL%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23f2f2f7%22%2C%22theme_color%22%3A%22%23ffffff%22%2C%22orientation%22%3A%22portrait%22%7D" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #f2f2f7; }
    body {
      font-family: -apple-system, 'Helvetica Neue', sans-serif;
      -webkit-text-size-adjust: 100%;
      -webkit-tap-highlight-color: transparent;
      overscroll-behavior: none;
    }
    #root { height: 100%; }

    /* Safe area insets for notch/home-indicator phones */
    .safe-top    { padding-top: max(22px, env(safe-area-inset-top)); }
    .safe-bottom { padding-bottom: max(12px, env(safe-area-inset-bottom)); }

    /* Remove number input spinners */
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
    input[type=number] { -moz-appearance: textfield; }

    /* Smooth scrolling */
    .scroll { overflow-y: auto; -webkit-overflow-scrolling: touch; }

    /* Prevent double-tap zoom on buttons */
    button { touch-action: manipulation; }
  </style>

  <!-- React + Babel via CDN -->
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ─── DATA ─────────────────────────────────────────────────────────────────────
const PHASES = [
  { weeks:[1,2,3,4],     name:"Accumulation",       color:"#3b82f6", phaseKey:"accumulation" },
  { weeks:[5,6,7,8],     name:"Intensification",    color:"#f97316", phaseKey:"intensification" },
  { weeks:[9],           name:"Deload",              color:"#22c55e", phaseKey:"deload" },
  { weeks:[10],          name:"Peak Week",           color:"#a855f7", phaseKey:"peak" },
  { weeks:[11,12,13,14], name:"Accumulation II",    color:"#3b82f6", phaseKey:"accumulation" },
  { weeks:[15,16,17,18], name:"Intensification II", color:"#f97316", phaseKey:"intensification" },
  { weeks:[19],          name:"Deload",              color:"#22c55e", phaseKey:"deload" },
  { weeks:[20],          name:"Peak Week",           color:"#a855f7", phaseKey:"peak" },
];
const getPhase = w => PHASES.find(p => p.weeks.includes(w)) || PHASES[0];

function s2w(w) { return Math.round((w * 0.9) / 1.25) * 1.25; }

const W1 = {
  push: {
    "Barbell Bench Press":                [82.5,87.5,92.5,100,95,102.5,107.5,110,65,117.5,85,90,95,102.5,100,105,110,115,65,117.5],
    "Barbell Shoulder Press":             [45,50,52.5,55,52.5,57.5,60,62.5,35,65,47.5,50,52.5,57.5,55,57.5,62.5,62.5,35,65],
    "Cable Standing Chest Press":         [70,75,80,85,82.5,87.5,92.5,95,55,100,72.5,77.5,82.5,87.5,85,90,95,97.5,55,100],
    "Cable Tricep Pushdown (Single Arm)": [16.25,17.5,18.75,18.75,18.75,20,21.25,21.25,12.5,22.5,16.25,17.5,18.75,20,18.75,20,21.25,22.5,12.5,22.5],
    "Cable Bent-Over Tricep Extension":   [31.25,33.75,36.25,38.75,37.5,40,41.25,43.75,25,45,32.5,35,37.5,40,38.75,41.25,43.75,45,25,45],
    "Dumbbell Lateral Raise":             [9,9,10,11,10,11,12,12,7,13,9,10,10,11,11,11,12,12,7,13],
  },
  pull: {
    "Machine Lat Pulldown":               [55,57.5,62.5,67.5,65,67.5,72.5,75,42.5,77.5,55,60,65,67.5,67.5,70,75,77.5,42.5,77.5],
    "Cable Seated Row":                   [62.5,67.5,72.5,77.5,75,80,82.5,87.5,50,90,65,70,75,80,77.5,82.5,87.5,90,50,90],
    "Cable Pullover with Rope":           [32.5,35,37.5,40,37.5,40,42.5,45,25,47.5,32.5,35,37.5,40,40,42.5,45,45,25,47.5],
    "Dumbbell Preacher Curl":             [15,16.25,16.25,17.5,17.5,18.75,18.75,20,11.25,21.25,15,16.25,17.5,18.75,17.5,18.75,20,20,11.25,21.25],
    "Barbell Reverse Curl":               [25,26.25,27.5,30,28.75,30,32.5,33.75,18.75,35,25,27.5,28.75,30,30,31.25,33.75,33.75,18.75,35],
    "Dumbbell Lateral Raise (Rear Delt)": [9,9,10,11,10,11,12,12,7,13,9,10,10,11,11,11,12,12,7,13],
    "Machine Seated Reverse Fly":         [17.5,20,20,22.5,22.5,22.5,25,25,15,25,17.5,20,22.5,22.5,22.5,22.5,25,25,15,25],
  },
  legs: {
    "Sled 45° Leg Press":           [215,230,245,260,250,265,280,290,165,305,220,235,250,265,260,275,290,300,165,305],
    "Machine Single Leg Extension": [37.5,40,42.5,47.5,45,47.5,50,52.5,30,55,40,42.5,45,47.5,47.5,50,52.5,52.5,30,55],
    "Machine Standing Leg Curl":    [15,15,17.5,17.5,17.5,17.5,20,20,12.5,20,15,15,17.5,17.5,17.5,20,20,20,12.5,20],
    "Smith Machine Calf Raise":     [100,105,110,120,115,120,130,135,75,140,100,110,115,120,120,125,135,135,75,140],
    "Machine Seated Hip Adduction": [52.5,57.5,60,65,62.5,65,70,72.5,42.5,75,55,57.5,62.5,65,65,67.5,72.5,75,42.5,75],
    "Machine Seated Hip Abduction": [40,42.5,42.5,45,42.5,45,47.5,50,30,52.5,42.5,45,47.5,50,50,52.5,55,57.5,30,60],
  },
};
const W2 = Object.fromEntries(Object.entries(W1).map(([m,ex])=>[m,Object.fromEntries(Object.entries(ex).map(([k,v])=>[k,v.map(s2w)]))]));

function bumpReps(r) {
  const map={"1–3":"3–5","4–6":"6–8","5–7":"7–9","6–10":"10–12","8–10":"10–12","8–12":"12–15","10–12":"12–15","10":"12","12":"14–15","12–15":"15–18","15":"18","5":"7–8"};
  return map[r]||r;
}

const BASE_EX = {
  push: [
    {name:"Barbell Bench Press",           type:"compound", sets:{accumulation:3,intensification:4,deload:2,peak:1}, reps:{accumulation:"6–10",intensification:"4–6",deload:"8–10",peak:"1–3"}},
    {name:"Barbell Shoulder Press",         type:"compound", sets:{accumulation:3,intensification:4,deload:2,peak:2}, reps:{accumulation:"8–10",intensification:"5–7",deload:"10",peak:"5"}},
    {name:"Cable Standing Chest Press",     type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:2}, reps:{accumulation:"12",intensification:"10–12",deload:"12",peak:"12"}},
    {name:"Cable Tricep Pushdown (Single Arm)",type:"isolation",sets:{accumulation:4,intensification:4,deload:2,peak:2},reps:{accumulation:"8–10",intensification:"6–8",deload:"12",peak:"10"}},
    {name:"Cable Bent-Over Tricep Extension",type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:1},reps:{accumulation:"12",intensification:"10–12",deload:"12",peak:"12"}},
    {name:"Dumbbell Lateral Raise",          type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:2},reps:{accumulation:"10–12",intensification:"10–12",deload:"12",peak:"12"}},
  ],
  pull: [
    {name:"Machine Lat Pulldown",           type:"compound", sets:{accumulation:3,intensification:4,deload:2,peak:2},reps:{accumulation:"8–10",intensification:"6–8",deload:"10",peak:"8"}},
    {name:"Cable Seated Row",               type:"compound", sets:{accumulation:3,intensification:4,deload:2,peak:2},reps:{accumulation:"10–12",intensification:"8–10",deload:"12",peak:"8"}},
    {name:"Cable Pullover with Rope",        type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:1},reps:{accumulation:"12",intensification:"10–12",deload:"12",peak:"12"}},
    {name:"Dumbbell Preacher Curl",          type:"isolation",sets:{accumulation:3,intensification:4,deload:2,peak:2},reps:{accumulation:"8–12",intensification:"6–8",deload:"12",peak:"10"}},
    {name:"Barbell Reverse Curl",            type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:1},reps:{accumulation:"12",intensification:"10–12",deload:"12",peak:"12"}},
    {name:"Dumbbell Lateral Raise (Rear Delt)",type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:2},reps:{accumulation:"12",intensification:"12",deload:"12",peak:"12"}},
    {name:"Machine Seated Reverse Fly",      type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:1},reps:{accumulation:"12",intensification:"12",deload:"12",peak:"12"}},
  ],
  legs: [
    {name:"Sled 45° Leg Press",             type:"compound", sets:{accumulation:3,intensification:4,deload:2,peak:2},reps:{accumulation:"8–10",intensification:"6–8",deload:"10",peak:"6–8"}},
    {name:"Machine Single Leg Extension",    type:"isolation",sets:{accumulation:4,intensification:4,deload:2,peak:2},reps:{accumulation:"8–12",intensification:"6–10",deload:"12",peak:"10"}},
    {name:"Machine Standing Leg Curl",       type:"isolation",sets:{accumulation:3,intensification:4,deload:2,peak:2},reps:{accumulation:"10–12",intensification:"8–10",deload:"12",peak:"10"}},
    {name:"Smith Machine Calf Raise",        type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:2},reps:{accumulation:"10–12",intensification:"8–10",deload:"12",peak:"10"}},
    {name:"Machine Seated Hip Adduction",    type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:1},reps:{accumulation:"10–12",intensification:"8–10",deload:"12",peak:"12"}},
    {name:"Machine Seated Hip Abduction",    type:"isolation",sets:{accumulation:3,intensification:3,deload:2,peak:1},reps:{accumulation:"12–15",intensification:"10–12",deload:"15",peak:"12"}},
  ],
};

const makeS2 = m => BASE_EX[m].map(ex=>({...ex,reps:Object.fromEntries(Object.entries(ex.reps).map(([k,v])=>[k,bumpReps(v)]))}));

const MUSCLES = ["push","pull","legs"];
const MC = {push:"#f97316",pull:"#3b82f6",legs:"#22c55e"};
const MC2 = {push:"#c2622a",pull:"#4a7abf",legs:"#2d7a4f"};

const META = {
  "push-1":{label:"Push 1",muscle:"push",slot:1,color:"#f97316",isS2:false,exercises:BASE_EX.push},
  "push-2":{label:"Push 2",muscle:"push",slot:2,color:"#c2622a",isS2:true, exercises:makeS2("push")},
  "pull-1":{label:"Pull 1",muscle:"pull",slot:1,color:"#3b82f6",isS2:false,exercises:BASE_EX.pull},
  "pull-2":{label:"Pull 2",muscle:"pull",slot:2,color:"#4a7abf",isS2:true, exercises:makeS2("pull")},
  "legs-1":{label:"Legs 1",muscle:"legs",slot:1,color:"#22c55e",isS2:false,exercises:BASE_EX.legs},
  "legs-2":{label:"Legs 2",muscle:"legs",slot:2,color:"#2d7a4f",isS2:true, exercises:makeS2("legs")},
};

// ─── STORAGE (localStorage — works offline) ───────────────────────────────────
const LS_LOG  = "ppl_log_v4";
const LS_WEEK = "ppl_week_v1";
function loadLog()  { try { return JSON.parse(localStorage.getItem(LS_LOG)||"{}"); }  catch{return {};} }
function saveLog(l) { try { localStorage.setItem(LS_LOG, JSON.stringify(l)); }        catch{} }
function loadWeek() { try { return parseInt(localStorage.getItem(LS_WEEK)||"1"); }    catch{return 1;} }
function saveWeek(w){ try { localStorage.setItem(LS_WEEK, String(w)); }               catch{} }
const mk = (sid,wk,ex) => `${sid}|w${wk}|${ex}`;

// ─── APP ──────────────────────────────────────────────────────────────────────
function App() {
  const [screen,  setScreen]  = useState("home");
  const [week,    setWeekState] = useState(() => loadWeek());
  const [sid,     setSid]     = useState("push-1");
  const [log,     setLog]     = useState(() => loadLog());
  const [saved,   setSaved]   = useState(false);
  const timer = useRef(null);

  // Auto-save
  useEffect(() => {
    if(timer.current) clearTimeout(timer.current);
    timer.current = setTimeout(()=>{ saveLog(log); setSaved(true); setTimeout(()=>setSaved(false),1400); },600);
  }, [log]);

  const setWeek = w => { setWeekState(w); saveWeek(w); };

  const phase    = getPhase(week);
  const phaseKey = phase.phaseKey;

  const updSet = (s,wk,ex,i,f,v) => {
    const key=mk(s,wk,ex);
    setLog(p=>{ const e=p[key]||{sets:[],note:""}; const sets=[...(e.sets||[])]; sets[i]={...(sets[i]||{}),[f]:v}; return{...p,[key]:{...e,sets}}; });
  };
  const updNote=(s,wk,ex,note)=>{
    const key=mk(s,wk,ex);
    setLog(p=>{ const e=p[key]||{sets:[],note:""}; return{...p,[key]:{...e,note}}; });
  };
  const getEntry=(s,wk,ex)=>log[mk(s,wk,ex)]||{sets:[],note:""};

  const getStats = sid => {
    const m=META[sid];
    const total=m.exercises.reduce((s,ex)=>s+(ex.sets[phaseKey]||3),0);
    const done=m.exercises.reduce((s,ex)=>s+(getEntry(sid,week,ex.name).sets||[]).filter(x=>x&&x.done).length,0);
    return{total,done,pct:total>0?done/total:0};
  };

  // ── HOME ──
  if(screen==="home") return (
    <div style={{...S.root,display:"flex",flexDirection:"column",height:"100vh"}}>
      {/* Header */}
      <div className="safe-top" style={S.hdr}>
        <div style={S.appLbl}>PPL LOGGER</div>
        <div style={S.wkRow}>
          <button onClick={()=>setWeek(Math.max(1,week-1))} style={S.wkBtn}>‹</button>
          <div style={{textAlign:"center"}}>
            <div style={S.wkNum}>WEEK {week}</div>
            <div style={{...S.phaseLbl,color:phase.color}}>{phase.name.toUpperCase()}</div>
          </div>
          <button onClick={()=>setWeek(Math.min(20,week+1))} style={S.wkBtn}>›</button>
        </div>
        <div style={S.wkStrip}>
          {Array.from({length:20},(_,i)=>i+1).map(w=>{
            const ph=getPhase(w),on=w===week;
            return <button key={w} onClick={()=>setWeek(w)} style={{...S.wkDot,background:on?ph.color:"#e5e5ea",border:`2px solid ${on?ph.color:"#e5e5ea"}`}}>
              <span style={{fontSize:8,fontWeight:800,color:on?"#fff":"#8e8e93"}}>{w}</span>
            </button>;
          })}
        </div>
      </div>
      {/* Body */}
      <div className="scroll" style={{flex:1,padding:"14px 14px 0"}}>
        <div style={S.secLbl}>8-DAY CYCLE</div>
        {MUSCLES.map(m=>{
          const s1=getStats(`${m}-1`),s2=getStats(`${m}-2`);
          return <div key={m} style={{marginBottom:12}}>
            <div style={{fontSize:9,letterSpacing:3,fontWeight:800,color:"#8e8e93",marginBottom:5,paddingLeft:2,textTransform:"uppercase"}}>{m}</div>
            <div style={{display:"flex",background:"#fff",borderRadius:14,overflow:"hidden",border:"1px solid #e5e5ea",boxShadow:"0 1px 4px rgba(0,0,0,0.06)"}}>
              <HalfCard label="Session 1" color={MC[m]}  stats={s1} onOpen={()=>{setSid(`${m}-1`);setScreen("session");}} />
              <div style={{width:1,background:"#e5e5ea",flexShrink:0}}/>
              <HalfCard label="Session 2" color={MC2[m]} stats={s2} onOpen={()=>{setSid(`${m}-2`);setScreen("session");}} muted />
            </div>
          </div>;
        })}
        <button onClick={()=>setScreen("history")} style={S.histBtn}>📋  View Full Log History</button>
        <div className="safe-bottom" style={{height:8}}/>
      </div>
    </div>
  );

  // ── SESSION ──
  if(screen==="session") {
    const meta=META[sid]; const wts=meta.slot===1?W1[meta.muscle]:W2[meta.muscle];
    return (
      <div style={{...S.root,display:"flex",flexDirection:"column",height:"100vh"}}>
        <div className="safe-top" style={{...S.topBar,borderBottom:`2px solid ${meta.color}30`}}>
          <button onClick={()=>setScreen("home")} style={S.backBtn}>← Back</button>
          <div style={{textAlign:"center"}}>
            <div style={{...S.topTitle,color:meta.color}}>{meta.label.toUpperCase()}</div>
            <div style={S.topSub}>Week {week} · {phase.name}{meta.isS2&&" · 90% load"}</div>
          </div>
          <div style={{...S.savedPill,opacity:saved?1:0}}>Saved ✓</div>
        </div>
        {meta.isS2&&<div style={S.s2Banner}>↓ Recovery session — 90% weights, higher reps</div>}
        <div className="scroll" style={{flex:1,padding:"10px 12px 0"}}>
          {meta.exercises.map(ex=>{
            const tSets=ex.sets[phaseKey]||3, tReps=ex.reps[phaseKey]||"10–12";
            const tWgt=wts[ex.name]?.[week-1]??"—";
            const entry=getEntry(sid,week,ex.name);
            const logSets=entry.sets||[];
            const doneN=logSets.filter(s=>s&&s.done).length;
            const allDone=doneN>=tSets;
            return <div key={ex.name} style={{...S.exCard,borderTop:`3px solid ${allDone?meta.color:"#e5e5ea"}`}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:700,color:meta.isS2?"#8e8e93":"#1c1c1e",marginBottom:5,lineHeight:1.3}}>{ex.name}</div>
                  <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                    <span style={{fontSize:9,fontWeight:700,padding:"2px 7px",borderRadius:4,background:ex.type==="compound"?"#e8f0fe":"#f2f2f7",color:ex.type==="compound"?"#1a56c4":"#8e8e93",textTransform:"uppercase",letterSpacing:0.5}}>{ex.type}</span>
                    <span style={{fontSize:11,color:meta.isS2?"#c7c7cc":"#8e8e93"}}>{tSets} × {tReps}</span>
                    <span style={{fontSize:13,fontWeight:800,color:meta.color}}>{tWgt}kg</span>
                  </div>
                </div>
                <div style={{textAlign:"right"}}>
                  <div style={{fontSize:18,fontWeight:900,color:allDone?meta.color:"#d1d1d6",lineHeight:1}}>{doneN}/{tSets}</div>
                  {allDone&&<div style={{fontSize:9,color:meta.color,letterSpacing:1,fontWeight:800}}>DONE</div>}
                </div>
              </div>
              {/* Set rows */}
              <div style={{background:"#f9f9fb",borderRadius:8,overflow:"hidden",marginBottom:8}}>
                <div style={{display:"grid",gridTemplateColumns:"26px 1fr 1fr 38px",gap:5,padding:"6px 8px",borderBottom:"1px solid #e5e5ea"}}>
                  {["SET","WEIGHT kg","REPS","✓"].map(h=><span key={h} style={{fontSize:9,letterSpacing:1,color:"#c7c7cc",fontWeight:700,textAlign:"center",textTransform:"uppercase"}}>{h}</span>)}
                </div>
                {Array.from({length:tSets},(_,i)=>{
                  const sd=logSets[i]||{}, isDone=!!sd.done;
                  return <div key={i} style={{display:"grid",gridTemplateColumns:"26px 1fr 1fr 38px",gap:5,padding:"7px 8px",alignItems:"center",borderBottom:"1px solid #f2f2f7",background:isDone?meta.color+"12":"transparent",borderLeft:`3px solid ${isDone?meta.color:"transparent"}`}}>
                    <span style={{fontSize:10,fontWeight:800,color:isDone?meta.color:"#c7c7cc",textAlign:"center"}}>S{i+1}</span>
                    <input type="number" inputMode="decimal" placeholder={String(tWgt)} value={sd.weight??""} onChange={e=>updSet(sid,week,ex.name,i,"weight",e.target.value)}
                      style={{...S.numIn,borderColor:isDone?meta.color+"55":"#e5e5ea",color:meta.isS2?"#8e8e93":"#1c1c1e"}}/>
                    <input type="number" inputMode="numeric" placeholder={tReps.includes("–")?tReps.split("–")[0]:tReps} value={sd.reps??""} onChange={e=>updSet(sid,week,ex.name,i,"reps",e.target.value)}
                      style={{...S.numIn,borderColor:isDone?meta.color+"55":"#e5e5ea",color:meta.isS2?"#8e8e93":"#1c1c1e"}}/>
                    <button onClick={()=>updSet(sid,week,ex.name,i,"done",!isDone)}
                      style={{...S.chkBtn,background:isDone?meta.color:"#f2f2f7",border:`2px solid ${isDone?meta.color:"#e5e5ea"}`,color:isDone?"#fff":"#c7c7cc"}}>
                      {isDone?"✓":"○"}
                    </button>
                  </div>;
                })}
              </div>
              <textarea placeholder="Note: RPE, how it felt…" value={entry.note||""} onChange={e=>updNote(sid,week,ex.name,e.target.value)} style={S.noteIn} rows={1}/>
            </div>;
          })}
          <div className="safe-bottom" style={{height:24}}/>
        </div>
      </div>
    );
  }

  // ── HISTORY ──
  if(screen==="history") {
    const entries=Object.entries(log)
      .filter(([,v])=>v.sets&&v.sets.some(s=>s&&s.done))
      .map(([key,val])=>{ const p=key.split("|"); return{sid:p[0],week:parseInt(p[1].replace("w","")),ex:p.slice(2).join("|"),...val}; })
      .sort((a,b)=>b.week-a.week||a.sid.localeCompare(b.sid));
    const byWeek={};
    entries.forEach(e=>{ if(!byWeek[e.week]) byWeek[e.week]=[]; byWeek[e.week].push(e); });
    return (
      <div style={{...S.root,display:"flex",flexDirection:"column",height:"100vh"}}>
        <div className="safe-top" style={S.topBar}>
          <button onClick={()=>setScreen("home")} style={S.backBtn}>← Back</button>
          <div style={{...S.topTitle,color:"#1c1c1e"}}>LOG HISTORY</div>
          <div style={{width:56}}/>
        </div>
        <div className="scroll" style={{flex:1,padding:"12px 12px 0"}}>
          {Object.keys(byWeek).length===0&&<div style={{color:"#aeaeb2",textAlign:"center",marginTop:60,fontSize:14}}>No sets logged yet.</div>}
          {Object.entries(byWeek).sort((a,b)=>b[0]-a[0]).map(([wk,wkE])=>{
            const ph=getPhase(parseInt(wk));
            return <div key={wk} style={{marginBottom:24}}>
              <div style={{fontSize:11,fontWeight:800,letterSpacing:2,color:ph.color,marginBottom:10,display:"flex",alignItems:"center",gap:8,textTransform:"uppercase"}}>
                Week {wk}
                <span style={{fontSize:9,background:ph.color+"18",color:ph.color,padding:"2px 7px",borderRadius:3}}>{ph.name}</span>
              </div>
              {wkE.map((e,i)=>{
                const sm=META[e.sid], color=sm?.color||"#888";
                const done=e.sets.filter(s=>s&&s.done);
                return <div key={i} style={{background:"#fff",border:"1px solid #e5e5ea",borderRadius:12,padding:"11px 13px",marginBottom:6,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:7}}>
                    <div style={{fontSize:13,fontWeight:700,color:"#1c1c1e"}}>{e.ex}</div>
                    <div style={{fontSize:9,fontWeight:800,background:color+"18",color,padding:"2px 8px",borderRadius:4,letterSpacing:0.5}}>{sm?.label||e.sid}</div>
                  </div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {done.map((s,si)=><div key={si} style={{background:"#f2f2f7",borderRadius:6,padding:"4px 9px",fontSize:12}}>
                      <span style={{color:"#aeaeb2",fontSize:10}}>S{si+1} </span>
                      <span style={{color:"#1c1c1e",fontWeight:700}}>{s.weight||"—"}kg</span>
                      <span style={{color:"#c7c7cc"}}> × </span>
                      <span style={{color:"#1c1c1e"}}>{s.reps||"—"}</span>
                    </div>)}
                  </div>
                  {e.note&&<div style={{fontSize:11,color:"#aeaeb2",marginTop:6,fontStyle:"italic"}}>"{e.note}"</div>}
                </div>;
              })}
            </div>;
          })}
          <div className="safe-bottom" style={{height:24}}/>
        </div>
      </div>
    );
  }
}

// ─── SUB-COMPONENTS ───────────────────────────────────────────────────────────
function HalfCard({label,color,stats,onOpen,muted=false}) {
  const done=stats.pct>=1;
  return <button onClick={onOpen} style={{flex:1,background:"transparent",border:"none",padding:"14px 12px",cursor:"pointer",textAlign:"left",display:"block",opacity:muted?0.75:1,borderTop:`3px solid ${color}`}}>
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
      <div style={{fontSize:13,fontWeight:800,color,marginBottom:2,letterSpacing:0.3}}>{label}</div>
      {done&&<div style={{fontSize:10,fontWeight:900,color,letterSpacing:0.5}}>✓</div>}
    </div>
    {muted&&<div style={{fontSize:9,color:"#aeaeb2",marginBottom:4}}>90% load · higher reps</div>}
    <div style={{height:3,background:"#e5e5ea",borderRadius:2,marginTop:6,overflow:"hidden"}}>
      <div style={{height:"100%",width:`${stats.pct*100}%`,background:color,borderRadius:2,transition:"width 0.3s"}}/>
    </div>
    <div style={{fontSize:9,color:stats.done>0?color:"#c7c7cc",marginTop:5,fontWeight:600,letterSpacing:0.3}}>{stats.done}/{stats.total} sets</div>
  </button>;
}

// ─── STYLES ───────────────────────────────────────────────────────────────────
const S = {
  root:    {fontFamily:"-apple-system,'Helvetica Neue',sans-serif",background:"#f2f2f7",color:"#1c1c1e",maxWidth:480,margin:"0 auto"},
  hdr:     {background:"#fff",padding:"0 18px 14px",borderBottom:"1px solid #e5e5ea"},
  appLbl:  {fontSize:9,letterSpacing:4,color:"#aeaeb2",paddingTop:14,marginBottom:16,textTransform:"uppercase"},
  wkRow:   {display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14},
  wkNum:   {fontSize:28,fontWeight:900,letterSpacing:-1,color:"#1c1c1e"},
  phaseLbl:{fontSize:10,letterSpacing:2,fontWeight:700,marginTop:2,textTransform:"uppercase"},
  wkBtn:   {background:"#f2f2f7",border:"1px solid #e5e5ea",color:"#8e8e93",width:42,height:42,borderRadius:12,fontSize:24,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},
  wkStrip: {display:"flex",gap:4,flexWrap:"wrap"},
  wkDot:   {width:28,height:28,borderRadius:6,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",padding:0},
  secLbl:  {fontSize:9,letterSpacing:3,color:"#aeaeb2",marginBottom:10,textTransform:"uppercase"},
  histBtn: {width:"100%",background:"#fff",border:"1px solid #e5e5ea",borderRadius:12,padding:"14px",color:"#8e8e93",fontSize:13,cursor:"pointer",marginTop:8,marginBottom:16,letterSpacing:0.3,fontFamily:"inherit",boxShadow:"0 1px 3px rgba(0,0,0,0.04)"},
  topBar:  {background:"#fff",borderBottom:"1px solid #e5e5ea",padding:"0 16px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"},
  backBtn: {background:"none",border:"none",color:"#007aff",fontSize:15,cursor:"pointer",paddingTop:14,width:60,textAlign:"left",fontFamily:"inherit",fontWeight:500},
  topTitle:{fontSize:13,fontWeight:800,letterSpacing:1,textTransform:"uppercase",paddingTop:14},
  topSub:  {fontSize:10,color:"#aeaeb2",textAlign:"center",letterSpacing:0.3,marginTop:2},
  savedPill:{fontSize:10,color:"#34c759",letterSpacing:0.5,width:60,textAlign:"right",fontWeight:600,paddingTop:14,transition:"opacity 0.3s"},
  s2Banner:{background:"#fffbf7",borderBottom:"1px solid #fde8d0",padding:"8px 16px",fontSize:12,color:"#c2622a"},
  exCard:  {background:"#fff",borderRadius:12,padding:"14px 13px",marginBottom:10,border:"1px solid #e5e5ea",boxShadow:"0 1px 3px rgba(0,0,0,0.05)"},
  numIn:   {background:"#f2f2f7",border:"1.5px solid #e5e5ea",borderRadius:8,fontSize:15,fontWeight:700,fontFamily:"inherit",padding:"8px 4px",textAlign:"center",width:"100%",outline:"none"},
  chkBtn:  {borderRadius:9,fontSize:15,fontWeight:900,width:36,height:36,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center",transition:"all 0.15s"},
  noteIn:  {width:"100%",background:"#f9f9fb",border:"1px solid #e5e5ea",borderRadius:8,color:"#8e8e93",fontSize:12,fontFamily:"inherit",padding:"8px 10px",resize:"none",outline:"none",boxSizing:"border-box",marginTop:6},
};

// ─── MOUNT ────────────────────────────────────────────────────────────────────
ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
